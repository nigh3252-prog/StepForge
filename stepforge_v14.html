<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STEPFORGE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;600&family=Russo+One&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #e8e3d8;
  --panel: #d8d2c5;
  --panel-dark: #c6bfb0;
  --cell-off: #bfb9aa;
  --cell-hover: #aaa49a;
  --cell-on-synth: #e8531e;
  --playhead: rgba(0,0,0,0.08);
  --border: #8a8378;
  --border-deep: #6a6460;
  --text: #1e1e1e;
  --text-dim: #6a6460;
  --accent: #e8531e;
  --led-glow: 0 0 8px;
  --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
}

html, body {
  background: var(--bg); color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  overflow: hidden; height: 100dvh; max-height: 100dvh;
  touch-action: manipulation;
}

button, select, input, .cell, .pat-slot, .wave-btn, .sample-btn, .tab-btn, .row-clear, .panel-toggle {
  touch-action: manipulation; user-select: none; -webkit-user-select: none;
}

body::before {
  content:''; position:fixed; top:0; left:0; width:100%; height:100%;
  background-image: var(--grain); pointer-events:none; z-index:9999; opacity:0.5;
}

.app {
  max-width: 900px; margin: 0 auto; padding: 6px;
  display: flex; flex-direction: column;
  height: 100dvh; overflow: hidden;
}

/* ── VHS CHEVRON BAR ── */
.chevron-bar { height: 28px; margin-bottom: 6px; overflow:hidden; border-radius:4px; }
.chevron-bar svg { width:100%; height:100%; display:block; }
.chevron-bar-bottom { height: 22px; margin-top: 6px; overflow:hidden; border-radius:4px; }
.chevron-bar-bottom svg { width:100%; height:100%; display:block; }

/* ── HEADER ── */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding: 5px 10px; margin-bottom: 4px;
  background: var(--panel-dark); border: 2px solid var(--border); border-radius:4px;
}
.logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.85em; letter-spacing: 2px; color: var(--text);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.12); line-height:1.3;
}
.logo-sub {
  font-family: 'IBM Plex Mono', monospace; font-size:0.38em;
  letter-spacing:3px; color:var(--text-dim); display:block; margin-top:3px; text-transform:uppercase;
}
.header-right { display:flex; align-items:center; gap:6px; }

.btn-icon {
  background: var(--panel); border: 2px solid var(--border-deep); color: var(--text-dim);
  font-size: 0.9em; padding: 5px 8px; border-radius:4px; cursor:pointer;
  font-family:'IBM Plex Mono',monospace; transition:all 0.1s;
  box-shadow: inset 0 -2px 0 rgba(0,0,0,0.18);
}
.btn-icon:hover { color:var(--text); background:var(--cell-hover); }
.btn-icon.active { background: var(--panel-dark); color: var(--text); }

/* Play + Stop in header */
.btn.play-btn {
  font-size: 0.58em; padding: 9px 16px; letter-spacing: 1px;
}
.btn.stop-btn-sm {
  font-size: 0.8em; padding: 8px 11px; color: var(--text-dim);
}
.btn.stop-btn-sm:hover { background: var(--accent); color:#fff; border-color:var(--accent); }

/* ── DIALS ── */
.dial-group {
  display:flex; align-items:center; gap:7px;
  cursor:ew-resize; touch-action:none; user-select:none;
  padding: 3px 6px; border-radius:6px;
  transition: background 0.15s;
}
.dial-group:hover { background: rgba(0,0,0,0.06); }
.dial-group:active { background: rgba(0,0,0,0.1); }
.dial-canvas {
  width: 48px; height: 48px; display:block;
  border-radius: 50%;
}
.dial-info { display:flex; flex-direction:column; align-items:flex-start; gap:1px; }
.dial-val {
  font-family: 'Russo One', sans-serif; font-size: 1em;
  color: var(--accent); line-height:1; min-width:32px;
}
.dial-label {
  font-size: 0.5em; color: var(--text-dim); text-transform:uppercase;
  letter-spacing: 1.5px; font-weight:600;
}

/* ── BUTTONS ── */
.btn {
  background: var(--panel); border: 3px solid var(--border-deep); color: var(--text);
  font-family: 'Press Start 2P', monospace; font-size: 0.54em;
  padding: 11px 14px; border-radius:6px; cursor:pointer;
  transition: all 0.1s; text-transform:uppercase; letter-spacing:1px;
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 0 2px 0 rgba(255,255,255,0.18);
}
.btn:hover { background:var(--cell-hover); }
.btn:active { transform: translateY(3px) scale(0.99); box-shadow: inset 0 2px 0 rgba(0,0,0,0.25); }
.btn.playing { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 0 14px rgba(232,83,30,0.5); }
.btn.danger:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn.rec-btn.recording { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 0 12px rgba(232,83,30,0.5); }

/* ── PANEL TOGGLE ── */
.panel-toggle {
  background:none; border:none; color:var(--text-dim); cursor:pointer;
  font-family:'IBM Plex Mono',monospace; font-size:0.68em; font-weight:600;
  padding:4px 8px; letter-spacing:1px; text-transform:uppercase;
  display:flex; align-items:center; gap:4px; transition:color 0.15s;
}
.panel-toggle:hover { color:var(--text); }
.panel-toggle .arrow { transition:transform 0.2s; display:inline-block; }
.panel-toggle .arrow.open { transform:rotate(90deg); }

/* ── OPTIONS DRAWER ── */
.options-drawer { max-height:0; overflow:hidden; transition:max-height 0.3s ease; }
.options-drawer.open { max-height:200px; }
.options-inner {
  padding:8px 10px; margin-bottom:5px;
  background:var(--panel); border:2px solid var(--border); border-radius:4px;
  display:flex; flex-wrap:wrap; gap:8px; align-items:center;
}
.opt-group { display:flex; align-items:center; gap:4px; }
.opt-group label { font-size:0.56em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; font-weight:600; }
.opt-group select, .track-type-sel {
  background:var(--panel-dark); border:2px solid var(--border); color:var(--text);
  font-family:'IBM Plex Mono',monospace; font-size:0.72em; font-weight:600;
  padding:4px 6px; border-radius:3px;
}
.opt-group input[type=range] { width:50px; accent-color:var(--text-dim); }
.opt-val { font-size:0.68em; color:var(--text-dim); min-width:24px; text-align:center; }

/* Pattern slots */
.pat-slots { display:flex; gap:3px; align-items:center; }
.pat-slot {
  width:26px; height:24px; background:var(--panel-dark); border:2px solid var(--border);
  border-radius:3px; color:var(--text-dim); font-size:0.7em; font-weight:600;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-family:'Russo One',sans-serif; transition:all 0.1s;
}
.pat-slot.active { color:var(--accent); border-color:var(--accent); background:#ddd5cf; }
.pat-slot:hover { background:var(--cell-hover); }

/* ── TRACK TABS ── */
.tab-row {
  display:flex; align-items:flex-end; gap:0; margin-bottom:0;
}
.tab-nav {
  flex:0 0 28px; height:42px;
  background:var(--panel); border:3px solid var(--border);
  border-bottom:none; border-radius:6px 6px 0 0;
  font-size:1.1em; color:var(--text-dim); cursor:pointer;
  display:none; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,0.1);
  transition: background 0.1s, color 0.1s;
}
.tab-nav:hover { background:var(--cell-hover); color:var(--text); }
.tab-nav.visible { display:flex; }
.tabs-scroll {
  flex:1; overflow:hidden; min-width:0;
}
.tabs { display:flex; gap:4px; margin-bottom:0; transition: transform 0.15s ease; }
.tab-btn {
  flex:1; padding:10px 6px; text-align:center; cursor:pointer;
  background:var(--panel); border:3px solid var(--border);
  border-bottom:none; border-radius:6px 6px 0 0;
  font-family:'Press Start 2P',monospace; font-size:0.52em;
  letter-spacing:1px; text-transform:uppercase; color:var(--text-dim);
  transition:all 0.12s; outline:none;
  touch-action: none;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,0.1);
}
.tab-btn:hover { color:var(--text); background:var(--panel-dark); }
.tab-btn { position: relative; }

/* Hold-to-delete charge indicator */
.hold-charge {
  display: none;
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 0%;
  background: linear-gradient(to top, #e8531e, #ff8c5a);
  opacity: 0.88;
  border-radius: 4px;
  pointer-events: none;
  z-index: 51;
  transition: none;
}
.hold-charge.active {
  display: block;
  animation: charge-fill 0.58s cubic-bezier(0.4, 0, 0.6, 1) forwards;
}
@keyframes charge-fill {
  0%   { height: 0%;   opacity: 0.7; }
  80%  { height: 85%;  opacity: 0.92; }
  100% { height: 100%; opacity: 1; }
}
.hold-charge-label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Press Start 2P', monospace;
  font-size: 0.85em;
  color: #fff;
  letter-spacing: 2px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  white-space: nowrap;
  pointer-events: none;
}

/* Grid wrap needs position:relative for overlay */
.grid-zone {
  position: relative;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.tab-btn.active { color:#fff; background:var(--accent); border-color:var(--accent); border-bottom:3px solid var(--accent); transform:translateY(2px); box-shadow:0 0 10px rgba(232,83,30,0.3); }
.tab-btn.tab-add { flex:0 0 44px; font-size:1em; padding:8px 4px; color:var(--text-dim); }
.tab-btn .tab-dot {
  display:inline-block; width:5px; height:5px; border-radius:50%;
  background:currentColor; margin-left:5px; opacity:0;
  vertical-align:middle; transition:opacity 0.2s;
}
.tab-btn[data-has-steps="true"] .tab-dot { opacity:0.75; }
.tab-btn.active[data-has-steps="true"] .tab-dot { background:#fff; opacity:0.9; }

/* ── SAMPLE BAR ── */
.sample-bar {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  padding:6px 10px;
  background:var(--panel-dark); border:2px solid var(--border);
  border-top:none; border-bottom:none; min-height:38px;
}
.sample-btn {
  background:var(--panel); border:2px solid var(--border); color:var(--text-dim);
  font-family:'IBM Plex Mono',monospace; font-size:0.6em; font-weight:600;
  padding:5px 9px; border-radius:4px; cursor:pointer;
  transition:all 0.1s; text-transform:uppercase; letter-spacing:0.5px;
  box-shadow: inset 0 -2px 0 rgba(0,0,0,0.14);
}
.sample-btn:hover { background:var(--cell-hover); color:var(--text); }
.sample-btn.loaded { border-color:var(--accent); color:var(--accent); }
.sample-name-tag { font-size:0.58em; color:var(--accent); font-weight:600; max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sample-clear {
  background:none; border:none; color:var(--text-dim); cursor:pointer;
  font-size:0.7em; padding:2px 4px; transition:color 0.1s;
}
.sample-clear:hover { color:var(--accent); }
.sample-bar-label { font-size:0.52em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; font-weight:600; }
.sample-actions { display:flex; gap:4px; }
.sample-actions .sample-btn { padding:3px 6px; font-size:0.55em; }
.type-label {
  margin-left:auto;
  font-size:0.52em; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;
  display:flex; align-items:center; gap:5px;
}
.type-label select {
  background:var(--panel); border:2px solid var(--border); color:var(--text);
  font-family:'IBM Plex Mono',monospace; font-size:0.9em; font-weight:700;
  padding:3px 5px; border-radius:3px; cursor:pointer;
}

/* Wave buttons */
.wave-btns { display:flex; gap:2px; }
.wave-btn {
  background:var(--panel-dark); border:2px solid var(--border); color:var(--text-dim);
  font-size:0.55em; padding:3px 5px; border-radius:3px; cursor:pointer;
  font-family:'IBM Plex Mono',monospace; font-weight:600; text-transform:uppercase; transition:all 0.1s;
}
.wave-btn.active { color:var(--accent); border-color:var(--accent); }

/* ── GRID ── */
.grid-wrap {
  overflow: hidden;
  background:var(--panel-dark); border:2px solid var(--border);
  border-top:none; border-radius:0 0 4px 4px;
  padding:6px; flex:1; min-height:0;
}

/* ── GRID PAGER ── */
.grid-pager {
  display:none; align-items:center; gap:8px;
  padding: 4px 8px; margin-top: 3px;
  background: var(--panel); border: 2px solid var(--border); border-radius: 4px;
}
.grid-pager.show { display:flex; }
.pager-track {
  flex:1; height:10px; background: var(--cell-off);
  border-radius: 5px; position:relative; cursor:pointer;
  border: 2px solid var(--border-deep);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
  touch-action: none;
}
.pager-fill {
  position:absolute; left:0; top:0; height:100%;
  background: var(--accent); border-radius:5px; transition: width 0.15s;
}
.pager-thumb {
  position:absolute; top:50%; transform:translate(-50%,-50%);
  width:22px; height:22px; border-radius:50%;
  background: var(--panel); border: 3px solid var(--accent);
  box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2), 0 0 6px rgba(232,83,30,0.3);
  transition: left 0.15s;
}
.pager-label {
  font-family:'IBM Plex Mono',monospace; font-size:0.58em;
  color:var(--text-dim); font-weight:600; min-width:52px; text-align:right;
}
.grid { display:flex; flex-direction:column; gap:2px; min-width:fit-content; }
.grid-row { display:flex; align-items:center; gap:2px; }
.row-label {
  width:52px; min-width:52px; font-size:0.46em; font-weight:600;
  color:var(--text-dim); text-align:right; padding-right:7px;
  font-family:'IBM Plex Mono',monospace; overflow:hidden; white-space:nowrap;
}
.cell {
  width:42px; height:36px; min-width:42px;
  background:var(--cell-off); border-radius:6px;
  cursor:pointer; transition:background 0.06s, box-shadow 0.06s, transform 0.04s;
  border:2px solid rgba(0,0,0,0.12);
  box-shadow:inset 0 -4px 0 rgba(0,0,0,0.2), 0 2px 0 rgba(255,255,255,0.2);
}
.cell:hover { background:var(--cell-hover); }
.cell.on { background:var(--accent); box-shadow:var(--led-glow) var(--accent), inset 0 -4px 0 rgba(0,0,0,0.22); }
.cell.playhead { outline:3px solid rgba(0,0,0,0.18); outline-offset:-2px; }
.cell.on.playhead { filter:brightness(1.3); }
.cell.beat-off { background:#b0a99a; }

.step-numbers { display:flex; align-items:center; gap:2px; margin-bottom:3px; }
.step-num { width:42px; min-width:42px; text-align:center; font-size:0.36em; color:var(--text-dim); font-family:'Press Start 2P',monospace; }
.step-num.beat-1 { color:var(--text); }
.step-num-pad { width:52px; min-width:52px; }

.row-clear {
  width:22px; min-width:22px; height:22px;
  background:none; border:2px solid var(--border); border-radius:3px;
  color:var(--text-dim); font-size:0.6em; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.1s; margin-left:3px;
}
.row-clear:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ── FOOTER ── */
.footer { display:flex; gap:4px; margin-top:5px; flex-wrap:wrap; align-items:center; }
.footer .btn { font-size:0.5em; padding:9px 10px; }
.footer-spacer { flex:1; }

/* Hidden */
.hidden-input { display:none; }

/* Scrollbar */
::-webkit-scrollbar { height:5px; width:5px; }
::-webkit-scrollbar-track { background:var(--panel); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ── CLIP TABS ── */
.clip-tabs { display:flex; gap:4px; flex-wrap:wrap; }
.clip-tab {
  min-width:42px;
  background:linear-gradient(180deg,#ddd6ce 0%,#beb7ae 100%);
  color:var(--text-dim); border:3px solid var(--border-deep);
  border-radius:6px; font-family:'Press Start 2P',monospace;
  font-size:0.5em; padding:7px 8px; cursor:pointer;
  transition:transform 0.08s, background 0.12s, color 0.12s;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,0.16);
}
.clip-tab.active { color:#fff; background:linear-gradient(180deg,#f0704a 0%,#c83a10 100%); border-color:var(--accent); }
.clip-tab.has-steps::after { content:'●'; margin-left:4px; font-size:0.7em; }
.clip-tab:not(.active).has-steps::after { color:var(--accent); }

/* ── MODAL ── */
.modal-overlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.5); z-index:10000;
  align-items:center; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--panel); border:3px solid var(--border); border-radius:6px;
  padding:20px; max-width:380px; width:90%; position:relative;
  box-shadow:0 8px 32px rgba(0,0,0,0.3); max-height:85dvh; overflow-y:auto;
}
.modal h3 { font-family:'Russo One',sans-serif; font-size:0.9em; letter-spacing:2px; margin-bottom:12px; color:var(--text); }
.modal p { font-size:0.7em; color:var(--text-dim); margin-bottom:10px; line-height:1.5; }
.modal .btn { width:100%; margin-bottom:6px; text-align:center; }
.modal-close { position:absolute; top:8px; right:10px; background:none; border:none; color:var(--text-dim); font-size:1.2em; cursor:pointer; }
.modal-close:hover { color:var(--accent); }
.progress-bar { height:4px; background:var(--border); border-radius:2px; margin-top:8px; overflow:hidden; display:none; }
.progress-bar.show { display:block; }
.progress-fill { height:100%; background:var(--accent); border-radius:2px; width:0%; transition:width 0.3s; }
.modal-status { font-size:0.6em; color:var(--text-dim); margin-top:6px; min-height:1.2em; }
.trim-editor { display:none; margin-top:12px; }
.trim-editor.show { display:block; }
.trim-meta { display:flex; justify-content:space-between; gap:8px; font-size:0.62em; color:var(--text-dim); margin-bottom:6px; flex-wrap:wrap; }
.trim-wave-wrap { background:var(--panel-dark); border:2px solid var(--border); border-radius:4px; padding:8px; margin-bottom:8px; }
#trimWaveform { width:100%; height:90px; display:block; background:var(--bg); border-radius:3px; touch-action:none; }
.trim-controls { display:flex; flex-direction:column; gap:8px; margin-bottom:8px; }
.trim-row { display:flex; align-items:center; gap:8px; }
.trim-row label { width:42px; min-width:42px; font-size:0.65em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; font-weight:600; }
.trim-row input[type=range] { flex:1; accent-color:var(--accent); }
.trim-time { min-width:52px; text-align:right; font-size:0.65em; color:var(--text); font-weight:600; }
.trim-actions { display:flex; gap:6px; flex-wrap:wrap; }
.trim-actions .btn { flex:1 1 110px; }
.segment-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:6px; }
.segment-pill { font-size:0.62em; color:var(--text-dim); padding:4px 8px; border:1px solid var(--border); border-radius:999px; }









/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .app { padding:4px; }
  .cell { width:32px; height:28px; min-width:32px; border-radius:4px; }
  .step-num { width:32px; min-width:32px; }
  .row-label { width:40px; min-width:40px; font-size:0.4em; }
  .step-num-pad { width:40px; min-width:40px; }
  .logo { font-size:0.82em; }
  .btn { padding:9px 10px; font-size:0.48em; }
  .chevron-bar { height:20px; }
  .header { padding:5px 8px; }
  .transport-row1 .btn.big-play { font-size:0.85em; padding:13px 14px; }
}
</style>
</head>
<body>

<div class="app">

  <div class="chevron-bar">
    <svg viewBox="0 0 900 28" preserveAspectRatio="none">
      <polygon points="0,0 150,0 300,28 450,0 600,28 750,0 900,28 900,28 0,28" fill="#8a8580"/>
      <polygon points="0,3 150,3 300,25 450,3 600,25 750,3 900,25 900,28 0,28" fill="#6d2a2a"/>
      <polygon points="0,6 150,6 300,22 450,6 600,22 750,6 900,22 900,28 0,28" fill="#e63946"/>
      <polygon points="0,9 150,9 300,19 450,9 600,19 750,9 900,19 900,28 0,28" fill="#f7941d"/>

<script>
'use strict';

// ═══════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════
let audioCtx = null, masterGain = null;
let bpm = 120, masterVolValue = 75; // declared early — used by ensureAudio

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = masterVolValue / 100;
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -16; comp.ratio.value = 4;
    comp.attack.value = 0.003; comp.release.value = 0.18;
    const limiter = audioCtx.createDynamicsCompressor();
    limiter.threshold.value = -6; limiter.knee.value = 0;
    limiter.ratio.value = 14; limiter.attack.value = 0.002; limiter.release.value = 0.09;
    masterGain.connect(comp); comp.connect(limiter); limiter.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// ─── SCALES ───
const SCALES = {
  major:[0,2,4,5,7,9,11,12], minor:[0,2,3,5,7,8,10,12],
  pentatonic:[0,2,4,7,9,12,14,16], blues:[0,3,5,6,7,10,12,15],
  dorian:[0,2,3,5,7,9,10,12], phrygian:[0,1,3,5,7,8,10,12],
  mixolydian:[0,2,4,5,7,9,10,12], wholetone:[0,2,4,6,8,10,12,14],
};
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ROOT_FREQ = 261.63;

function getFreq(root, degree, scale) {
  const s = SCALES[scale]||SCALES.major;
  const semi = s[degree % s.length] + Math.floor(degree / s.length) * 12;
  return ROOT_FREQ * Math.pow(2, (root + semi) / 12);
}
function getNoteName(root, degree, scale) {
  const s = SCALES[scale]||SCALES.major;
  const semi = s[degree % s.length];
  const idx = (root + semi) % 12;
  const oct = 4 + Math.floor((root + semi + Math.floor(degree / s.length) * 12) / 12);
  return NOTE_NAMES[idx] + oct;
}

// ─── SYNTH ───
let synthWaveform = 'sawtooth';
const synthEnv = { a: 0.01, d: 0.15, s: 0.3, r: 0.2 };

function playSynth(freq, vol=1) {
  ensureAudio(); const t = audioCtx.currentTime;
  const o1 = audioCtx.createOscillator(); o1.type = synthWaveform; o1.frequency.value = freq;
  const o2 = audioCtx.createOscillator(); o2.type = synthWaveform; o2.frequency.value = freq * 1.003;
  const filt = audioCtx.createBiquadFilter(); filt.type='lowpass';
  filt.frequency.setValueAtTime(freq*6,t); filt.frequency.exponentialRampToValueAtTime(freq*1.5,t+synthEnv.d+synthEnv.r); filt.Q.value=2;
  const eg = audioCtx.createGain();
  const dur = synthEnv.a + synthEnv.d + 0.1 + synthEnv.r;
  eg.gain.setValueAtTime(0,t);
  eg.gain.linearRampToValueAtTime(vol*0.3,t+synthEnv.a);
  eg.gain.linearRampToValueAtTime(vol*synthEnv.s*0.3,t+synthEnv.a+synthEnv.d);
  eg.gain.linearRampToValueAtTime(0,t+dur);
  o1.connect(filt); o2.connect(filt); filt.connect(eg); eg.connect(masterGain);
  o1.start(t); o1.stop(t+dur); o2.start(t); o2.stop(t+dur);
}


// ─── SAMPLE MANAGEMENT ───
const activeOneShots = new Set();

function trackOneShot(source) {
  if (!source) return source;
  activeOneShots.add(source);
  source.addEventListener('ended', () => activeOneShots.delete(source), { once: true });
  return source;
}
function stopTrackedOneShots() {
  activeOneShots.forEach(s => { try { s.stop(); } catch(e) {} });
  activeOneShots.clear();
}

function playSample(buffer, rate=1, vol=1) {
  ensureAudio();
  if (activeOneShots.size >= 14) {
    const oldest = activeOneShots.values().next().value;
    try { oldest.stop(); } catch(e) {}
    activeOneShots.delete(oldest);
  }
  const src = trackOneShot(audioCtx.createBufferSource());
  src.buffer = buffer; src.playbackRate.value = rate;
  const g = audioCtx.createGain(); g.gain.value = vol * 0.5;
  src.connect(g); g.connect(masterGain); src.start();
}

function playClipSelectionPreview(clip, clipIndex=0) {
  ensureAudio(); stopTrackedOneShots();
  if (clip && clip.buffer) {
    const src = trackOneShot(audioCtx.createBufferSource());
    src.buffer = clip.buffer;
    const g = audioCtx.createGain();
    const now = audioCtx.currentTime;
    const fadeOutAt = Math.max(0.08, clip.buffer.duration - 0.12);
    g.gain.setValueAtTime(0.0001, now); g.gain.linearRampToValueAtTime(0.24, now + 0.01);
    if (clip.buffer.duration > 0.14) {
      g.gain.setValueAtTime(0.24, now + fadeOutAt);
      g.gain.exponentialRampToValueAtTime(0.0001, now + clip.buffer.duration);
    }
    src.connect(g); g.connect(masterGain); src.start(now); return;
  }
  const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
  const now = audioCtx.currentTime;
  osc.type='triangle'; osc.frequency.value=220+(clipIndex*38);
  g.gain.setValueAtTime(0.0001,now); g.gain.linearRampToValueAtTime(0.18,now+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,now+0.18);
  osc.connect(g); g.connect(masterGain); osc.start(now); osc.stop(now+0.18);
}

// ═══════════════════════════════════════════
// TRACK SYSTEM
// ═══════════════════════════════════════════
const NUM_ROWS = 8;
const MAX_PATTERNS = 8;
const MAX_TRACKS = 24;
const TRACK_NAMES = ['A','B','C','D','E','F','G','H'];

let numSteps = 8, currentScale = 'minor', rootNote = 0;
let swing = 0, playing = false, currentStep = -1, stepTimer = null, currentPattern = 0;

function createEmptyGridMatrix() {
  return Array.from({length:NUM_ROWS}, () => new Array(32).fill(false));
}

function createTrack(nameIdx=0) {
  return {
    name: TRACK_NAMES[nameIdx] || String(nameIdx+1),
    loadedSample: null,
    patterns: Array.from({length:MAX_PATTERNS}, () => createEmptyGridMatrix()),
    rowVolumes: Array.from({length:NUM_ROWS}, () => 0.8),
  };
}

let tracks = [createTrack(0), createTrack(1)];
let currentTrackIdx = 0;

// ─── PATTERN GRID HELPERS ───
function getTrackPatternGrid(track, patIdx=currentPattern) {
  const s = track.loadedSample;
  if (s?.clips?.length > 1) {
    ensureClipPatternBanks(s);
    const ci = Math.max(0, Math.min(s.activeClip||0, s.clips.length-1));
    return s.clipPatterns[ci][patIdx];
  }
  return track.patterns[patIdx];
}

function getTrackClipTracks(track) {
  const s = track.loadedSample;
  if (s?.clips?.length > 1) {
    ensureClipPatternBanks(s);
    return s.clips.map((clip, idx) => ({
      clip, clipIndex: idx,
      pattern: s.clipPatterns[idx][currentPattern],
    }));
  }
  return [];
}

function ensureClipPatternBanks(sampleData) {
  if (!sampleData || !sampleData.clips || !sampleData.clips.length) return sampleData;
  if (!sampleData.clipPatterns || sampleData.clipPatterns.length !== sampleData.clips.length) {
    sampleData.clipPatterns = sampleData.clips.map(() => Array.from({length:MAX_PATTERNS}, () => createEmptyGridMatrix()));
  }
  sampleData.clipPatterns.forEach(bank => { while (bank.length < MAX_PATTERNS) bank.push(createEmptyGridMatrix()); });
  return sampleData;
}

function normalizeSampleData(sampleData) {
  if (!sampleData) return null;
  if (sampleData.clips && sampleData.clips.length) {
    const activeClip = Math.max(0, Math.min(sampleData.activeClip||0, sampleData.clips.length-1));
    return { ...sampleData, activeClip, buffer: sampleData.clips[activeClip].buffer };
  }
  return sampleData;
}
function getActiveSampleData(sampleData) { return normalizeSampleData(sampleData); }

function getSampleDisplayName(sampleData, fallback='') {
  if (!sampleData) return fallback;
  const n = getActiveSampleData(sampleData);
  if (n.clips && n.clips.length > 1) return `${n.name} [C${(n.activeClip||0)+1}]`;
  return n.name || fallback;
}

function clipHasProgrammedSteps(track, clipIndex) {
  const s = track.loadedSample;
  if (!s?.clips || !s.clipPatterns || !s.clipPatterns[clipIndex]) return false;
  const grid = s.clipPatterns[clipIndex][currentPattern];
  if (!grid) return false;
  for (let r=0;r<NUM_ROWS;r++) for (let st=0;st<numSteps;st++) if (grid[r][st]) return true;
  return false;
}

function trackHasSteps(ti) {
  const track = tracks[ti];
  for (let p=0;p<MAX_PATTERNS;p++) {
    const grid = track.patterns[p];
    for (let r=0;r<NUM_ROWS;r++) for (let s=0;s<numSteps;s++) if (grid[r][s]) return true;
  }
  // also check clip patterns
  const sd = track.loadedSample;
  if (sd?.clipPatterns) {
    for (const bank of sd.clipPatterns)
      for (const grid of bank)
        for (let r=0;r<NUM_ROWS;r++) for (let s=0;s<numSteps;s++) if (grid[r][s]) return true;
  }
  return false;
}

// ─── TRACK SWITCHING ───
function switchTrack(idx) {
  if (idx < 0 || idx >= tracks.length) return;
  currentTrackIdx = idx;
  updateTrackBar();
  updateSampleBar();
  renderGrid();
  // Preview the track's sample on selection
  const t = tracks[idx];
  if (t.loadedSample) {
    stopTrackedOneShots();
    const s = getActiveSampleData(t.loadedSample);
    if (s?.buffer) playClipSelectionPreview(s, 0);
  }
}

function addTrack() {
  if (tracks.length >= MAX_TRACKS) return;
  // Cycle through types for variety
  tracks.push(createTrack(tracks.length));
  switchTrack(tracks.length - 1);
}


// ─── EXTRACT / SAMPLE LOADING ───
let extractTrackIdx = 0;

function openExtractModal() {
  extractTrackIdx = currentTrackIdx;
  document.getElementById('extractModal').classList.add('show');
  document.getElementById('extractStatus').textContent = '';
  document.getElementById('extractProgress').classList.remove('show');
  document.getElementById('trimEditor').classList.remove('show');
}
function closeExtractModal() {
  stopPreview();
  document.getElementById('extractModal').classList.remove('show');
  document.getElementById('trimEditor').classList.remove('show');
}

function setTargetSampleData(sampleData) {
  const normalized = normalizeSampleData(sampleData);
  ensureClipPatternBanks(normalized);
  const track = tracks[extractTrackIdx];
  track.loadedSample = normalized;
  updateSampleBar();
}

function clearCurrentTrackSample() {
  tracks[currentTrackIdx].loadedSample = null;
  updateSampleBar();
}

function setActiveClipForCurrentTrack(clipIndex) {
  const track = tracks[currentTrackIdx];
  if (!track.loadedSample?.clips?.length) return;
  ensureClipPatternBanks(track.loadedSample);
  track.loadedSample.activeClip = Math.max(0, Math.min(clipIndex, track.loadedSample.clips.length-1));
  track.loadedSample.buffer = track.loadedSample.clips[track.loadedSample.activeClip].buffer;
  playClipSelectionPreview(track.loadedSample.clips[track.loadedSample.activeClip], clipIndex);
  updateSampleBar(); renderGrid();
}

// ─── TRIM / SEGMENT SYSTEM ───
const pendingExtract = {
  fileName:'', sourceBuffer:null, trimStart:0, trimEnd:0,
  segments:[], segmentIndex:-1, cachedPeaks:null,
};

function formatSeconds(sec) { return `${sec.toFixed(2)}s`; }

function copySegmentToBuffer(sourceBuffer, startSec, endSec) {
  const sr = sourceBuffer.sampleRate;
  const start = Math.max(0, Math.floor(startSec*sr));
  const end = Math.max(start+1, Math.min(sourceBuffer.length, Math.ceil(endSec*sr)));
  const out = audioCtx.createBuffer(sourceBuffer.numberOfChannels, end-start, sr);
  for (let ch=0;ch<sourceBuffer.numberOfChannels;ch++)
    out.getChannelData(ch).set(sourceBuffer.getChannelData(ch).slice(start, end));
  return out;
}

function getWavePeaks(buffer, count=120) {
  if (!buffer) return [];
  if (pendingExtract.cachedPeaks?.length===count) return pendingExtract.cachedPeaks;
  const data = buffer.getChannelData(0);
  const block = Math.max(1, Math.floor(data.length/count));
  const peaks = [];
  for (let i=0;i<count;i++) {
    let sum=0;
    for (let j=i*block;j<Math.min(data.length,(i+1)*block);j++) sum=Math.max(sum,Math.abs(data[j]));
    peaks.push(sum);
  }
  pendingExtract.cachedPeaks = peaks;
  return peaks;
}

function drawTrimWaveform() {
  const canvas = document.getElementById('trimWaveform');
  const ctx2 = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const width = canvas.clientWidth||320, height = canvas.clientHeight||90;
  canvas.width = Math.floor(width*dpr); canvas.height = Math.floor(height*dpr);
  ctx2.setTransform(dpr,0,0,dpr,0,0);
  ctx2.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
  ctx2.fillRect(0,0,width,height);
  if (!pendingExtract.sourceBuffer) return;
  const peaks = getWavePeaks(pendingExtract.sourceBuffer, 140);
  const mid = height/2;
  ctx2.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();
  peaks.forEach((peak, i) => {
    const x = (i/peaks.length)*width;
    const barH = Math.max(2, peak*(height*0.86));
    ctx2.fillRect(x, mid-barH/2, Math.max(1,width/peaks.length-1), barH);
  });
  const dur = pendingExtract.sourceBuffer.duration||1;
  const sr = pendingExtract.trimStart/dur, er = pendingExtract.trimEnd/dur;
  ctx2.fillStyle='rgba(0,0,0,0.22)';
  ctx2.fillRect(0,0,sr*width,height); ctx2.fillRect(er*width,0,width-er*width,height);
  ctx2.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  ctx2.lineWidth=2;
  ctx2.strokeRect(sr*width,1,Math.max(2,(er-sr)*width),height-2);
}

function refreshPendingTrimUi() {
  if (!pendingExtract.sourceBuffer) return;
  const duration = pendingExtract.sourceBuffer.duration;
  pendingExtract.trimStart = Math.max(0, Math.min(pendingExtract.trimStart, duration));
  pendingExtract.trimEnd = Math.max(0.02, Math.min(pendingExtract.trimEnd, duration));
  if (pendingExtract.trimStart > pendingExtract.trimEnd-0.02) pendingExtract.trimStart = Math.max(0, pendingExtract.trimEnd-0.02);
  document.getElementById('trimStart').value = Math.round((pendingExtract.trimStart/duration)*1000);
  document.getElementById('trimEnd').value = Math.round((pendingExtract.trimEnd/duration)*1000);
  document.getElementById('trimStartVal').textContent = formatSeconds(pendingExtract.trimStart);
  document.getElementById('trimEndVal').textContent = formatSeconds(pendingExtract.trimEnd);
  document.getElementById('trimDuration').textContent = `${formatSeconds(pendingExtract.trimEnd-pendingExtract.trimStart)} / ${formatSeconds(duration)}`;
  document.getElementById('segmentStatus').textContent = pendingExtract.segments.length
    ? `Clip ${pendingExtract.segmentIndex+1} / ${pendingExtract.segments.length}` : 'No clips yet';
  const tabs = document.getElementById('pendingClipTabs');
  tabs.innerHTML = pendingExtract.segments.map((seg,idx) =>
    `<button class="clip-tab${idx===pendingExtract.segmentIndex?' active':''}" onclick="applyPendingSegment(${idx}); useTrimmedClip()">C${idx+1}</button>`
  ).join('');
  drawTrimWaveform();
}

function loadPendingBuffer(buffer, fileName) {
  pendingExtract.fileName = fileName;
  pendingExtract.sourceBuffer = buffer;
  pendingExtract.trimStart = 0;
  pendingExtract.trimEnd = buffer.duration;
  pendingExtract.segments = []; pendingExtract.segmentIndex = -1; pendingExtract.cachedPeaks = null;
  document.getElementById('trimEditor').classList.add('show');
  document.getElementById('trimFileName').textContent = fileName;
  refreshPendingTrimUi();
}

async function processSelectedMediaFile(file) {
  if (!file) return;
  ensureAudio();
  const status = document.getElementById('extractStatus');
  const progBar = document.getElementById('extractProgress');
  const progFill = document.getElementById('extractFill');
  progBar.classList.add('show'); progFill.style.width='10%';
  status.textContent='Reading file...';
  try {

let previewIsPlaying = false;
let previewSrc = null;

function stopPreview() {
  if (previewSrc) { try { previewSrc.stop(); } catch(e) {} previewSrc = null; }
  activeOneShots.delete(previewSrc);
  previewIsPlaying = false;
  const btn = document.getElementById('previewBtn');
  if (btn) btn.textContent = 'Preview';
}

function previewTrimmedClip() {
  if (!pendingExtract.sourceBuffer) return;
  if (previewIsPlaying) { stopPreview(); return; }
  ensureAudio();
  stopTrackedOneShots();
  const src = audioCtx.createBufferSource();
  src.buffer = pendingExtract.sourceBuffer;
  const g = audioCtx.createGain(); g.gain.value = 0.5;
  src.connect(g); g.connect(masterGain);
  src.start(0, pendingExtract.trimStart, Math.max(0.02, pendingExtract.trimEnd-pendingExtract.trimStart));
  src.onended = () => { previewIsPlaying = false; const btn = document.getElementById('previewBtn'); if(btn) btn.textContent = 'Preview'; previewSrc = null; };
  previewSrc = src;
  previewIsPlaying = true;
  const btn = document.getElementById('previewBtn');
  if (btn) btn.textContent = '■ Stop';
}

function buildSampleDataFromPending() {
  const currentClip = copySegmentToBuffer(pendingExtract.sourceBuffer, pendingExtract.trimStart, pendingExtract.trimEnd);
  const sampleData = { buffer: currentClip, name: `${pendingExtract.fileName} [trim]` };
  if (pendingExtract.segments.length) {
    const clips = pendingExtract.segments.slice(0,10).map((seg,idx) => ({
      buffer: copySegmentToBuffer(pendingExtract.sourceBuffer, seg.start, seg.end),
      start: seg.start, end: seg.end,
      name: `${pendingExtract.fileName} [C${idx+1}]`,
    }));
    const activeClip = Math.max(0, pendingExtract.segmentIndex);
    return { buffer: clips[activeClip].buffer, name: pendingExtract.fileName, clips, activeClip, clipMode:'multitrack' };
  }
  return sampleData;
}

function useTrimmedClip() {
  if (!pendingExtract.sourceBuffer) return;

  if (pendingExtract.segments.length > 1) {
    // Multiple clips → each becomes its own track tab
    const segs = pendingExtract.segments.slice(0, MAX_TRACKS);

    // Load first clip into the current track
    const firstBuf = copySegmentToBuffer(pendingExtract.sourceBuffer, segs[0].start, segs[0].end);
    tracks[extractTrackIdx].loadedSample = { buffer: firstBuf, name: `${pendingExtract.fileName} C1` };

    // Create new tracks for remaining clips
    for (let i = 1; i < segs.length && tracks.length < MAX_TRACKS; i++) {
      const buf = copySegmentToBuffer(pendingExtract.sourceBuffer, segs[i].start, segs[i].end);
      const newTrack = createTrack(tracks.length);
      newTrack.loadedSample = { buffer: buf, name: `${pendingExtract.fileName} C${i + 1}` };
      tracks.push(newTrack);
    }
    currentTrackIdx = extractTrackIdx;
    updateTrackBar(); updateSampleBar();
    document.getElementById('extractStatus').textContent = `✓ ${segs.length} clips loaded as tracks`;
  } else {
    // Single clip → load into current track as before
    const buf = copySegmentToBuffer(pendingExtract.sourceBuffer, pendingExtract.trimStart, pendingExtract.trimEnd);
    tracks[extractTrackIdx].loadedSample = { buffer: buf, name: pendingExtract.fileName };
    updateSampleBar();
    document.getElementById('extractStatus').textContent = `✓ Loaded ${formatSeconds(pendingExtract.trimEnd - pendingExtract.trimStart)}`;
  }
  setTimeout(closeExtractModal, 400);
}

function autoSegmentCurrentFile() {
  if (!pendingExtract.sourceBuffer) return;
  const buffer = pendingExtract.sourceBuffer;
  const sr = buffer.sampleRate;
  // Respect the current trim start — only analyze from there onward
  const analysisStart = Math.floor(pendingExtract.trimStart * sr);
  const analysisEnd = Math.floor(pendingExtract.trimEnd * sr);
  const data = buffer.getChannelData(0);
  const windowSize = Math.max(128, Math.floor(sr * 0.08));
  const energies = [];
  for (let i = analysisStart; i < analysisEnd; i += windowSize) {
    let sum = 0; const end = Math.min(analysisEnd, i + windowSize);
    for (let j = i; j < end; j++) sum += Math.abs(data[j]);
    energies.push(sum / Math.max(1, end - i));
  }
  const maxE = Math.max(...energies, 0.00001);
  const threshold = Math.max(0.012, maxE * 0.22);
  const minFrames = Math.max(2, Math.round((0.18 * sr) / windowSize));
  const gapFrames = Math.max(1, Math.round((0.09 * sr) / windowSize));
  const segments = []; let start = null, silentRun = 0;
  for (let i = 0; i < energies.length; i++) {
    const active = energies[i] >= threshold;
    if (active && start === null) start = i;
    if (start !== null) {
      if (!active) silentRun++; else silentRun = 0;
      if (silentRun >= gapFrames) {
        const endIdx = i - silentRun + 1;
        if (endIdx - start >= minFrames) {
          // Offset back to absolute buffer time
          segments.push({
            start: pendingExtract.trimStart + start * windowSize / sr,
            end:   Math.min(pendingExtract.trimEnd, pendingExtract.trimStart + endIdx * windowSize / sr)
          });
        }
        start = null; silentRun = 0;
      }
    }
  }
  if (start !== null) {
    segments.push({
      start: pendingExtract.trimStart + start * windowSize / sr,
      end:   pendingExtract.trimEnd
    });
  }
  const merged = [];
  segments.forEach(seg => {
    if (!merged.length) { merged.push(seg); return; }
    const prev = merged[merged.length - 1];
    if (seg.start - prev.end < 0.06) prev.end = seg.end; else merged.push(seg);
  });
  const fallback = [{ start: pendingExtract.trimStart, end: pendingExtract.trimEnd }];
  const clipped = (merged.length ? merged : fallback)
    .map(seg => ({ start: Math.max(0, seg.start), end: Math.max(seg.start + 0.05, seg.end) }))
    .filter(seg => seg.end - seg.start >= 0.05)
    .slice(0, 10);
  pendingExtract.segments = clipped; pendingExtract.segmentIndex = 0;
  if (clipped[0]) { pendingExtract.trimStart = clipped[0].start; pendingExtract.trimEnd = clipped[0].end; }
  document.getElementById('extractStatus').textContent = `✓ Auto-snipped ${clipped.length} clip${clipped.length===1?'':'s'} from ${formatSeconds(pendingExtract.trimStart)} onward`;
  refreshPendingTrimUi();
}

function applyPendingSegment(index) {
  if (!pendingExtract.segments[index]) return;
  pendingExtract.segmentIndex=index;
  const seg=pendingExtract.segments[index];
  pendingExtract.trimStart=seg.start; pendingExtract.trimEnd=seg.end;
  refreshPendingTrimUi();
}
function prevSegment() {
  if (!pendingExtract.segments.length) return;
  applyPendingSegment((pendingExtract.segmentIndex-1+pendingExtract.segments.length)%pendingExtract.segments.length);
}
function nextSegment() {
  if (!pendingExtract.segments.length) return;
  applyPendingSegment((pendingExtract.segmentIndex+1)%pendingExtract.segments.length);
}

// ─── WAV EXPORT (clips) ───
function audioBufferToWavBlob(buffer) {
  const numCh=buffer.numberOfChannels, sr=buffer.sampleRate, bps=2, ba=numCh*bps, ds=buffer.length*ba;
  const ab=new ArrayBuffer(44+ds); const v=new DataView(ab);
  const ws=(off,str)=>{ for(let i=0;i<str.length;i++) v.setUint8(off+i,str.charCodeAt(i)); };
  ws(0,'RIFF');v.setUint32(4,36+ds,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);
  v.setUint16(20,1,true);v.setUint16(22,numCh,true);v.setUint32(24,sr,true);v.setUint32(28,sr*ba,true);
  v.setUint16(32,ba,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,ds,true);
  let off=44;
  for(let i=0;i<buffer.length;i++) for(let ch=0;ch<numCh;ch++) {
    let s=Math.max(-1,Math.min(1,buffer.getChannelData(ch)[i]));
    v.setInt16(off,s<0?s*0x8000:s*0x7FFF,true); off+=2;
  }
  return new Blob([ab],{type:'audio/wav'});
}
function downloadBlob(blob, fileName) {
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=fileName; a.click(); setTimeout(()=>URL.revokeObjectURL(url),500);
}
function slugify(name) { return (name||'clip').replace(/\.[^.]+$/,'').replace(/[^a-z0-9]+/gi,'-').replace(/^-+|-+$/,'').toLowerCase()||'clip'; }
function downloadActiveClip() {
  const track=tracks[currentTrackIdx]; const s=track.loadedSample; if(!s) return;
  const active=getActiveSampleData(s); if(!active?.buffer) return;
  const cn=active.clips?.length?(active.activeClip||0)+1:1;
  downloadBlob(audioBufferToWavBlob(active.buffer),`${slugify(active.name||'clip')}-c${cn}.wav`);
}
function downloadAllClips() {
  const track=tracks[currentTrackIdx]; const s=track.loadedSample; if(!s) return;
  if (s.clips?.length) { s.clips.forEach((clip,idx)=>setTimeout(()=>downloadBlob(audioBufferToWavBlob(clip.buffer),`${slugify(s.name||'clip')}-c${idx+1}.wav`),idx*120)); return; }
  const active=getActiveSampleData(s); if(active?.buffer) downloadBlob(audioBufferToWavBlob(active.buffer),`${slugify(active.name||'clip')}.wav`);
}

// ═══════════════════════════════════════════
// SEQUENCER STATE & PLAYBACK
// ═══════════════════════════════════════════
function togglePlay() {
  ensureAudio();
  if (playing) { stopSeq(); return; }
  playing=true; currentStep=-1;
  document.getElementById('playBtn').classList.add('playing');
  document.getElementById('playBtn').textContent='❚❚ Pause';
  scheduleNext();
}
function stopSeq() {
  playing=false; if(stepTimer) clearTimeout(stepTimer); stepTimer=null;
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('playBtn').textContent='▶ Play';
  currentStep=-1; renderGrid();
}
function stopAllAudio() { stopSeq(); stopTrackedOneShots(); }

function scheduleNext() {
  if (!playing) return;
  currentStep = (currentStep+1) % numSteps;

  tracks.forEach((track, ti) => {
    const clipTracks = getTrackClipTracks(track);
    const pat = getTrackPatternGrid(track);
    if (clipTracks.length) {
      clipTracks.forEach(ct => {
        for (let r=0;r<NUM_ROWS;r++) {
          if (ct.pattern[r][currentStep]) {
            const deg=NUM_ROWS-1-r, semi=(SCALES[currentScale]||SCALES.major)[deg%8];
            playSample(ct.clip.buffer, Math.pow(2,semi/12), track.rowVolumes[r]);
          }
        }
      });
    } else {
      for (let r=0;r<NUM_ROWS;r++) {
        if (pat[r][currentStep]) {
          const vol=track.rowVolumes[r], deg=NUM_ROWS-1-r;
          if (track.loadedSample) {
            const semi=(SCALES[currentScale]||SCALES.major)[deg%8];
            playSample(getActiveSampleData(track.loadedSample).buffer,Math.pow(2,semi/12),vol);
          } else playSynth(getFreq(rootNote,deg,currentScale),vol);
        }
      }
    }
  });

  renderGrid();
  const beatMs=(60000/bpm)/4;
  let delay=beatMs;
  if (currentStep%2===0&&swing>0) delay=beatMs*(1+swing/200);
  else if (currentStep%2===1&&swing>0) delay=beatMs*(1-swing/200);
  stepTimer=setTimeout(scheduleNext,delay);
}

// ─── TAB SCROLL STATE ───
let tabScrollIdx = 0;

function scrollTabs(dir) {
  tabScrollIdx = Math.max(0, tabScrollIdx + dir);
  updateTrackBar();
}

function deleteTrack(idx) {
  if (tracks.length <= 1) return;
  tracks.splice(idx, 1);
  tracks.forEach((tr, j) => { tr.name = TRACK_NAMES[j] || String(j + 1); });
  currentTrackIdx = Math.min(currentTrackIdx, tracks.length - 1);
  tabScrollIdx = Math.min(tabScrollIdx, Math.max(0, tracks.length - 1));
  updateTrackBar(); updateSampleBar(); renderGrid();
}

// ─── HOLD-TO-DELETE ───
let holdDeleteTimer = null;
let holdDeleteIdx = null;

function startHoldDelete(idx) {
  cancelHoldDelete();
  holdDeleteIdx = idx;
  const charge = document.getElementById('holdCharge');
  if (charge) {
    charge.style.display = 'block';
    // Force reflow so animation restarts cleanly
    charge.classList.remove('active');
    void charge.offsetWidth;
    charge.classList.add('active');
  }
  holdDeleteTimer = setTimeout(() => {
    holdDeleteTimer = null;
    holdDeleteIdx = null;
    if (navigator.vibrate) navigator.vibrate([30, 40, 60]);
    cancelHoldDelete(false); // hide bar first
    deleteTrack(idx);
  }, 580);
}

function cancelHoldDelete(resetDisplay = true) {
  clearTimeout(holdDeleteTimer);
  holdDeleteTimer = null;
  holdDeleteIdx = null;
  const charge = document.getElementById('holdCharge');
  if (charge) {
    charge.classList.remove('active');
    if (resetDisplay) charge.style.display = 'none';
  }
}

function updateTrackBar() {
  const bar = document.getElementById('trackBar');
  if (!bar) return;
  bar.innerHTML = '';

  tracks.forEach((t, i) => {
    const isActive = i === currentTrackIdx;
    const colorClass = isActive ? 'active' : '';
    const hasSteps = trackHasSteps(i);
    const btn = document.createElement('button');
    btn.className = `tab-btn ${colorClass}`.trim();
    btn.dataset.hasSteps = hasSteps;
    btn.innerHTML = `${t.name}<span class="tab-dot"></span>`;

    let didHold = false;

    btn.addEventListener('pointerdown', e => {
      didHold = false;
      try { btn.setPointerCapture(e.pointerId); } catch(_) {}
      // Start charge after short delay so quick taps feel instant
      const holdStart = setTimeout(() => {
        didHold = true;
        startHoldDelete(i);
      }, 180);
      // Store timer on element so pointerup can clear it
      btn._holdStart = holdStart;
    });

    btn.addEventListener('pointerup', () => {
      clearTimeout(btn._holdStart);
      if (holdDeleteTimer !== null) {
        // Released before delete fired — cancel
        cancelHoldDelete();
      } else if (!didHold) {
        // Quick clean tap — select
        switchTrack(i);
      }
      didHold = false;
    });

    btn.addEventListener('pointercancel', () => {
      clearTimeout(btn._holdStart);
      cancelHoldDelete();
      didHold = false;
    });

    bar.appendChild(btn);
  });

  // Add-track button
  if (tracks.length < MAX_TRACKS) {
    const addBtn = document.createElement('button');
    addBtn.className = 'tab-btn tab-add';
    addBtn.textContent = '+';
    addBtn.onclick = addTrack;
    bar.appendChild(addBtn);
  }

  // Overflow nav arrows
  const scroll = document.getElementById('tabsScroll');
  const navL = document.getElementById('tabNavL');
  const navR = document.getElementById('tabNavR');
  if (!scroll || !navL || !navR) return;

  requestAnimationFrame(() => {
    const scrollW = scroll.offsetWidth;
    const totalW = bar.scrollWidth;
    const overflow = totalW > scrollW + 4;
    if (overflow) {
      const btns = bar.querySelectorAll('.tab-btn');
      const idx = Math.min(tabScrollIdx, btns.length - 1);
      const btnLeft = btns[idx] ? btns[idx].offsetLeft : 0;
      bar.style.transform = `translateX(-${btnLeft}px)`;
      const lastBtn = btns[btns.length - 1];
      const lastRight = lastBtn ? lastBtn.offsetLeft + lastBtn.offsetWidth - btnLeft : 0;
      navL.classList.toggle('visible', tabScrollIdx > 0);
      navR.classList.toggle('visible', lastRight > scrollW);
    } else {
      bar.style.transform = 'translateX(0)';
      tabScrollIdx = 0;
      navL.classList.remove('visible');
      navR.classList.remove('visible');
    }
  });
}

function updateSampleBar() {
  const bar = document.getElementById('sampleBar');
  const track = tracks[currentTrackIdx];
  const s = track.loadedSample;
  bar.innerHTML = `
    <button class="sample-btn${s?' loaded':''}" onclick="openExtractModal()">${s ? '♫ ' + getSampleDisplayName(s).slice(0, 16) : '+ Load Sample'}</button>
    ${s ? `<button class="sample-clear" onclick="clearCurrentTrackSample()" title="Remove sample">✕</button>` : ''}
  `;
}

// ─── GRID PAGING ───
const PAGE_SIZE = 8;
let gridPage = 0;

function numPages() { return Math.max(1, Math.ceil(numSteps / PAGE_SIZE)); }

function setGridPage(page) {
  gridPage = Math.max(0, Math.min(numPages() - 1, page));
  renderGrid();
  renderGridPager();
}

function renderGridPager() {
  const pager = document.getElementById('gridPager');
  if (!pager) return;
  const pages = numPages();
  if (pages <= 1) { pager.classList.remove('show'); return; }
  pager.classList.add('show');
  const thumbPct = pages > 1 ? (gridPage / (pages - 1)) * 100 : 0;
  const fillPct = ((gridPage + 1) / pages) * 100;
  const startStep = gridPage * PAGE_SIZE + 1;
  const endStep = Math.min(numSteps, (gridPage + 1) * PAGE_SIZE);
  pager.innerHTML = `
    <div class="pager-track" id="pagerTrack">
      <div class="pager-fill" style="width:${fillPct}%"></div>
      <div class="pager-thumb" style="left:${thumbPct}%"></div>
    </div>
    <span class="pager-label">${startStep}–${endStep}</span>
  `;
  const track = document.getElementById('pagerTrack');
  if (!track) return;
  let dragging = false;
  function fromX(x) {
    const rect = track.getBoundingClientRect();
    const t = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
    setGridPage(Math.round(t * (pages - 1)));
  }
  track.onpointerdown = e => { dragging=true; track.setPointerCapture(e.pointerId); fromX(e.clientX); e.preventDefault(); };
  track.onpointermove = e => { if(dragging) fromX(e.clientX); };
  track.onpointerup = track.onpointercancel = () => { dragging=false; };
}

function getRowLabel(track, r) {
  return getNoteName(rootNote, NUM_ROWS-1-r, currentScale);
}

function renderStepNumbers() {
  const c = document.getElementById('stepNumbers');
  const viewStart = gridPage * PAGE_SIZE;
  const viewEnd = Math.min(numSteps, viewStart + PAGE_SIZE);
  let h = '<div class="step-num-pad"></div>';
  for (let s = viewStart; s < viewEnd; s++)
    h += `<div class="step-num${s%4===0?' beat-1':''}">${s+1}</div>`;
  h += '<div style="width:26px;min-width:26px;"></div>';
  c.innerHTML = h;
}

function renderGrid() {
  const container = document.getElementById('grid');
  const track = tracks[currentTrackIdx];
  const pat = getTrackPatternGrid(track);
  const cls = 'on';
  const viewStart = gridPage * PAGE_SIZE;
  const viewEnd = Math.min(numSteps, viewStart + PAGE_SIZE);
  let html = '';
  for (let r = 0; r < NUM_ROWS; r++) {
    html += '<div class="grid-row">';
    html += `<div class="row-label">${getRowLabel(track,r)}</div>`;
    for (let s = viewStart; s < viewEnd; s++) {
      const on = pat[r][s];
      const ph = (s === currentStep && playing) ? ' playhead' : '';
      const beat = (s % 8 >= 4) ? ' beat-off' : '';
      html += `<div class="cell${on?` ${cls}`:''}${ph}${!on?beat:''}" data-r="${r}" data-s="${s}"></div>`;
    }
    html += `<button class="row-clear" onclick="clearRow(${r})" title="Clear row">✕</button>`;
    html += '</div>';
  }
  container.innerHTML = html;

  // Pointer-based drag painting
  let isDrawing=false, drawMode=true, previewedRow=null;
  const paintCell=(target,shouldPreview=false)=>{
    if (!target||!target.classList.contains('cell')) return;
    const r=parseInt(target.dataset.r), s=parseInt(target.dataset.s);
    pat[r][s]=drawMode;
    const beat=(s%8>=4)?' beat-off':'';
    target.className=`cell${drawMode?' on':''}${(s===currentStep&&playing)?' playhead':''}${!drawMode?beat:''}`;
    updateTrackBar();
    if (shouldPreview&&drawMode&&!playing&&previewedRow!==r) { previewedRow=r; previewSound(track,r); }
  };
  container.onpointerdown=(e)=>{
    const target=e.target.closest('.cell'); if(!target) return;
    e.preventDefault();
    const r=parseInt(target.dataset.r), s=parseInt(target.dataset.s);
    isDrawing=true; previewedRow=null; drawMode=!pat[r][s];
    try { container.setPointerCapture(e.pointerId); } catch(_){}
    paintCell(target,true);
  };
  container.onpointermove=(e)=>{
    if (!isDrawing) return;
    const target=document.elementFromPoint(e.clientX,e.clientY)?.closest('.cell');
    if (!target||!container.contains(target)) return;
    e.preventDefault(); paintCell(target,false);
  };
  const stopDrawing=(e)=>{ isDrawing=false; previewedRow=null; try{container.releasePointerCapture(e?.pointerId);}catch(_){} };
  container.onpointerup=stopDrawing;
  container.onpointercancel=stopDrawing;
  container.onpointerleave=(e)=>{ if(e.buttons===0) stopDrawing(e); };
}

function previewSound(track, row) {
  ensureAudio();
  const deg = NUM_ROWS-1-row;
  if (track.loadedSample) {
    const semi = (SCALES[currentScale]||SCALES.major)[deg%8];
    playSample(getActiveSampleData(track.loadedSample).buffer, Math.pow(2,semi/12), track.rowVolumes[row]);
  } else {
    playSynth(getFreq(rootNote,deg,currentScale), track.rowVolumes[row]);
  }
}

// ═══════════════════════════════════════════
// DIAL CONTROLS
// ═══════════════════════════════════════════
const DIAL_START = 135 * Math.PI / 180; // start angle (canvas coords, from +x axis)
const DIAL_END   = 405 * Math.PI / 180; // 270° sweep

function drawDial(canvasId, value, min, max, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const size = 48;
  canvas.width = canvas.height = size * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cx = size / 2, cy = size / 2;
  const rOuter = size / 2 - 3;
  const rInner = rOuter - 5;
  const t = Math.max(0, Math.min(1, (value - min) / (max - min)));
  const currentAngle = DIAL_START + t * (DIAL_END - DIAL_START);

  // Body circle
  ctx.beginPath();
  ctx.arc(cx, cy, rOuter - 1, 0, Math.PI * 2);
  ctx.fillStyle = '#c6bfb0';
  ctx.fill();
  ctx.strokeStyle = '#6a6460';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Track arc (background)
  ctx.beginPath();
  ctx.arc(cx, cy, rInner, DIAL_START, DIAL_END);
  ctx.strokeStyle = 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Value arc (filled)
  ctx.beginPath();
  ctx.arc(cx, cy, rInner, DIAL_START, currentAngle);
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Pointer dot on rim
  const px = cx + rInner * Math.cos(currentAngle);
  const py = cy + rInner * Math.sin(currentAngle);
  ctx.beginPath();
  ctx.arc(px, py, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function setupDial(groupId, canvasId, valId, min, max, step, getVal, setVal, color) {
  const group = document.getElementById(groupId);
  if (!group) return;
  let startX = null, startVal = null;
  const PX_PER_STEP = 4; // pixels of drag per one step

  function onDown(e) {
    startX = e.clientX ?? e.touches?.[0]?.clientX;
    startVal = getVal();
    try { group.setPointerCapture(e.pointerId); } catch(_) {}
    e.preventDefault();
  }
  function onMove(e) {
    if (startX === null) return;
    const x = e.clientX ?? e.touches?.[0]?.clientX;
    const steps = Math.round((x - startX) / PX_PER_STEP);
    const newVal = Math.max(min, Math.min(max, startVal + steps * step));
    if (newVal !== getVal()) { setVal(newVal); drawDial(canvasId, newVal, min, max, color); }
    e.preventDefault();
  }
  function onUp() { startX = null; }

  group.addEventListener('pointerdown', onDown);
  group.addEventListener('pointermove', onMove);
  group.addEventListener('pointerup', onUp);
  group.addEventListener('pointercancel', onUp);
}

// BPM dial: 60–200, step 1
function updateBPM(v) {
  bpm = Math.round(v);
  document.getElementById('bpmVal').textContent = bpm;
  drawDial('bpmDial', bpm, 60, 200, '#e8531e');
}

// Swing dial: 0–80, step 2
function updateSwing(v) {
  swing = Math.round(v);
  document.getElementById('swingVal').textContent = swing + '%';
  drawDial('swingDial', swing, 0, 80, '#2a5c9a');
}

function initDials() {
  drawDial('bpmDial', bpm, 60, 200, '#e8531e');
  drawDial('swingDial', swing, 0, 80, '#2a5c9a');
  setupDial('bpmDialGroup',   'bpmDial',   'bpmVal',   60,  200, 1, ()=>bpm,   updateBPM,   '#e8531e');
  setupDial('swingDialGroup', 'swingDial', 'swingVal',  0,   80, 2, ()=>swing, updateSwing, '#2a5c9a');
}

// ─── CONTROLS ───
function updateSteps(v) {
  numSteps = parseInt(v);
  gridPage = 0;
  if (currentStep >= numSteps) currentStep = 0;
  renderStepNumbers(); renderGrid(); renderGridPager();
}

function clearRow(r) {
  const pat=getTrackPatternGrid(tracks[currentTrackIdx]);
  for(let s=0;s<32;s++) pat[r][s]=false;
  renderGrid(); updateTrackBar();
}
function clearAll() {
  const track=tracks[currentTrackIdx];
  const pat=getTrackPatternGrid(track);
  for(let r=0;r<NUM_ROWS;r++) for(let s=0;s<32;s++) pat[r][s]=false;
  renderGrid(); updateTrackBar();
}
function randomize() {
  const track=tracks[currentTrackIdx];
  const pat=getTrackPatternGrid(track);
  const density = 0.15;
  for(let r=0;r<NUM_ROWS;r++) for(let s=0;s<numSteps;s++) pat[r][s]=Math.random()<density;
  renderGrid(); updateTrackBar();
}

// ─── OPTIONS DRAWER ───
let optionsOpen = false;
function toggleOptions() {
  optionsOpen = !optionsOpen;
  document.getElementById('optionsDrawer').classList.toggle('open', optionsOpen);
  const btn = document.getElementById('optToggle');
  if (btn) btn.classList.toggle('active', optionsOpen);
  // Redraw BPM dial after drawer opens (canvas needs layout)
  if (optionsOpen) requestAnimationFrame(() => {
    drawDial('bpmDial', bpm, 60, 200, '#e8531e');
    drawDial('swingDial', swing, 0, 80, '#2a5c9a');
  });
}
function initScaleSelect() {
  const sel=document.getElementById('scaleSelect');
  sel.innerHTML=Object.keys(SCALES).map(s=>`<option value="${s}"${s===currentScale?' selected':''}>${s}</option>`).join('');
}
function initWaveBtns() {
  const c=document.getElementById('waveBtns');
  c.innerHTML=['sine','triangle','sawtooth','square'].map(w=>
    `<button class="wave-btn${synthWaveform===w?' active':''}" onclick="setWave('${w}')">${w.slice(0,3)}</button>`
  ).join('');
}
function setWave(w) { synthWaveform=w; initWaveBtns(); }

// ─── FULLSCREEN ───
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err=>console.warn(err));
  } else { document.exitFullscreen(); }
}
document.addEventListener('fullscreenchange',()=>{
  const btn=document.getElementById('fsBtn');
  if (btn) btn.textContent=document.fullscreenElement?'⊠':'⛶';
});

// ─── AUDIO EXPORT (Record) ───
let mediaRecorder=null, exportChunks=[];
function toggleAudioExport() {
  ensureAudio();
  const btn=document.getElementById('recBtn');
  if (mediaRecorder&&mediaRecorder.state==='recording') { mediaRecorder.stop(); return; }
  const dest=audioCtx.createMediaStreamDestination();
  masterGain.connect(dest);
  const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':
    MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')?'audio/ogg;codecs=opus':'audio/webm';
  exportChunks=[];
  try { mediaRecorder=new MediaRecorder(dest.stream,{mimeType}); } catch(e) { mediaRecorder=new MediaRecorder(dest.stream); }
  mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) exportChunks.push(e.data); };
  mediaRecorder.onstop=()=>{
    const ext=mimeType.includes('ogg')?'ogg':'webm';
    downloadBlob(new Blob(exportChunks,{type:mimeType}),`stepforge-${Date.now()}.${ext}`);
    try{masterGain.disconnect(dest);}catch(e){}
    if(btn){btn.textContent='● Rec';btn.classList.remove('recording');}
    mediaRecorder=null;
  };
  mediaRecorder.start(100);
  if(btn){btn.textContent='■ Stop Rec';btn.classList.add('recording');}
  if(!playing) togglePlay();
}

// ─── IMPORT / EXPORT ───
function exportPattern() {
  const data={
    version:3,
    tracks: tracks.map(t=>({name:t.name,patterns:t.patterns,rowVolumes:t.rowVolumes,clipPatterns:t.loadedSample?.clipPatterns||null})),
    currentScale, rootNote, bpm, swing, numSteps, synthWaveform, visiblePatternTabs,
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='stepforge-pattern.json'; a.click();
  URL.revokeObjectURL(url);
}
function importPattern(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try {
      const data=JSON.parse(ev.target.result);
      if (data.version===3&&data.tracks) {
        tracks=data.tracks.map((t,i)=>{
          const track=createTrack(i);
          track.name=t.name||TRACK_NAMES[i]||String(i+1);
          if(t.patterns) track.patterns=t.patterns;
          if(t.rowVolumes) track.rowVolumes=t.rowVolumes;
          return track;
        });
        currentTrackIdx=0;
      } else if (data.patterns) {
        // Legacy v1/v2 import
        tracks=[createTrack(0),createTrack(1)];
        ['synth'].forEach((type,ti)=>{
          for(let i=0;i<Math.min(MAX_PATTERNS,data.patterns.length);i++) {
            if(data.patterns[i]?.[type]) tracks[ti].patterns[i]=data.patterns[i][type];
          }
        });
        currentTrackIdx=0;
      }
      if(data.currentScale){currentScale=data.currentScale;document.getElementById('scaleSelect').value=currentScale;}
      if(data.rootNote!==undefined){rootNote=data.rootNote;document.getElementById('rootSelect').value=rootNote;}
      if(data.bpm){ updateBPM(data.bpm); }
      if(data.swing!==undefined){ updateSwing(data.swing); document.getElementById('swingSlider') && (document.getElementById('swingSlider').value=data.swing); }
      if(data.numSteps){numSteps=data.numSteps;document.getElementById('stepsSelect').value=numSteps;}
      if(data.synthWaveform){synthWaveform=data.synthWaveform;initWaveBtns();}
      updateTrackBar(); updateSampleBar(); renderStepNumbers(); renderGrid();
    } catch(err){alert('Invalid pattern file');}
  };
  reader.readAsText(file); e.target.value='';
}

// ─── KEYBOARD ───
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay();}
});

// ─── INIT ───
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('videoInput').addEventListener('change',async(e)=>{
    const file=e.target.files[0]; if(file) await processSelectedMediaFile(file); e.target.value='';
  });
  document.getElementById('trimStart').addEventListener('input',(e)=>{
    if(!pendingExtract.sourceBuffer) return;
    pendingExtract.trimStart=(parseInt(e.target.value)/1000)*pendingExtract.sourceBuffer.duration;
    pendingExtract.segmentIndex=-1; refreshPendingTrimUi();
  });
  document.getElementById('trimEnd').addEventListener('input',(e)=>{
    if(!pendingExtract.sourceBuffer) return;
    pendingExtract.trimEnd=(parseInt(e.target.value)/1000)*pendingExtract.sourceBuffer.duration;
    pendingExtract.segmentIndex=-1; refreshPendingTrimUi();
  });
  initScaleSelect(); initWaveBtns(); initDials();
  updateTrackBar(); updateSampleBar();
  renderStepNumbers(); renderGrid(); renderGridPager();
});
</script>
