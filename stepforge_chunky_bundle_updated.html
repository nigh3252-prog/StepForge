<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STEPFORGE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=IBM+Plex+Mono:wght@400;600&family=Russo+One&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #d4cfc8;
  --panel: #c9c4bb;
  --panel-dark: #b8b3a9;
  --cell-off: #bab5ab;
  --cell-hover: #a8a49a;
  --cell-on-synth: #e63946;
  --cell-on-drum: #f77f00;
  --cell-on-drone: #1d8348;
  --playhead: rgba(0,0,0,0.06);
  --border: #9e998f;
  --text: #2c2c2c;
  --text-dim: #6b6660;
  --accent: #e63946;
  --rainbow-blue: #00a2e0;
  --rainbow-green: #4db848;
  --rainbow-yellow: #ffd200;
  --rainbow-orange: #f7941d;
  --rainbow-red: #e63946;
  --rainbow-maroon: #6d2a2a;
  --rainbow-gray: #8a8580;
  --led-glow: 0 0 6px;
  --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  overflow-x: hidden; min-height: 100vh;
  touch-action: manipulation;
}

button,
select,
input,
.cell,
.pat-slot,
.wave-btn,
.sample-btn,
.tab-btn,
.row-clear,
.panel-toggle {
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

body::before {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background-image: var(--grain);
  pointer-events: none; z-index: 9999; opacity: 0.5;
}

.app { max-width: 900px; margin: 0 auto; padding: 10px; position: relative; }

/* ── VHS CHEVRON BAR ── */
.chevron-bar {
  height: 32px; margin-bottom: 8px; overflow: hidden; border-radius: 4px;
  position: relative;
}
.chevron-bar svg { width: 100%; height: 100%; display: block; }

.chevron-bar-bottom {
  height: 24px; margin-top: 8px; overflow: hidden; border-radius: 4px;
}
.chevron-bar-bottom svg { width: 100%; height: 100%; display: block; }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; margin-bottom: 6px;
  background: var(--panel-dark);
  border: 2px solid var(--border); border-radius: 4px;
  position: relative;
}
.logo {
  font-family: 'Bowlby One SC', cursive;
  font-size: 1.6em; letter-spacing: 2px; color: var(--text);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  line-height: 1;
}
.logo-sub {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.42em;
  font-weight: 400; letter-spacing: 3px; color: var(--text-dim);
  display: block; margin-top: 2px; text-transform: uppercase;
}

.header-right { display: flex; align-items: center; gap: 10px; }
.vol-knob { display: flex; align-items: center; gap: 4px; }
.vol-knob label { font-size: 0.6em; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.vol-knob input[type=range] { width: 60px; accent-color: var(--accent); }

/* ── TRANSPORT (always visible) ── */
.transport {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 8px 12px; margin-bottom: 6px;
  background: var(--panel-dark); border: 2px solid var(--border); border-radius: 4px;
}

.btn {
  background: var(--panel); border: 2px solid var(--border); color: var(--text);
  font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 0.8em;
  padding: 7px 14px; border-radius: 3px; cursor: pointer;
  transition: all 0.1s; text-transform: uppercase; letter-spacing: 1px;
}
.btn:hover { background: var(--cell-hover); }
.btn:active { transform: scale(0.97); }
.btn.playing { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 0 12px rgba(230,57,70,0.5); }
.btn.stop-btn:hover { background: var(--accent); color: #fff; }
.btn.big-play { font-size: 0.95em; padding: 14px 20px; min-width: 120px; }
.clip-tab.has-steps::after { content: '•'; margin-left: 6px; color: #fff; opacity: 0.9; }
.clip-tab:not(.active).has-steps::after { color: var(--accent); }

.bpm-group { display: flex; align-items: center; gap: 4px; }
.bpm-group label { font-size: 0.6em; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.bpm-group input[type=range] { width: 70px; accent-color: var(--text-dim); }
.bpm-val {
  font-family: 'Russo One', sans-serif; font-size: 0.85em; color: var(--accent);
  min-width: 30px; text-align: center;
}

.transport-spacer { flex: 1; }

/* ── COLLAPSIBLE PANEL TOGGLE ── */
.panel-toggle {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.7em; font-weight: 600;
  padding: 4px 8px; letter-spacing: 1px; text-transform: uppercase;
  display: flex; align-items: center; gap: 4px;
  transition: color 0.15s;
}
.panel-toggle:hover { color: var(--text); }
.panel-toggle .arrow { transition: transform 0.2s; display: inline-block; }
.panel-toggle .arrow.open { transform: rotate(90deg); }

/* ── OPTIONS DRAWER ── */
.options-drawer {
  max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
}
.options-drawer.open { max-height: 300px; }

.options-inner {
  padding: 8px 12px; margin-bottom: 6px;
  background: var(--panel); border: 2px solid var(--border); border-radius: 4px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
}
.opt-group { display: flex; align-items: center; gap: 4px; }
.opt-group label { font-size: 0.6em; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.opt-group select {
  background: var(--panel-dark); border: 2px solid var(--border); color: var(--text);
  font-family: 'IBM Plex Mono', monospace; font-size: 0.75em; font-weight: 600;
  padding: 4px 6px; border-radius: 3px;
}
.opt-group input[type=range] { width: 50px; accent-color: var(--text-dim); }
.opt-val { font-size: 0.7em; color: var(--text-dim); min-width: 24px; text-align: center; }

/* Pattern slots */
.pat-slots { display: flex; gap: 3px; align-items: center; }
.pat-slot {
  width: 26px; height: 24px; background: var(--panel-dark); border: 2px solid var(--border);
  border-radius: 3px; color: var(--text-dim); font-size: 0.7em; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-family: 'Russo One', sans-serif;
  transition: all 0.1s;
}
.pat-slot.active { color: var(--accent); border-color: var(--accent); background: #ddd5cf; }
.pat-slot:hover { background: var(--cell-hover); }

/* Wave buttons */
.wave-btns { display: flex; gap: 2px; }
.wave-btn {
  background: var(--panel-dark); border: 2px solid var(--border); color: var(--text-dim);
  font-size: 0.55em; padding: 3px 5px; border-radius: 3px; cursor: pointer;
  font-family: 'IBM Plex Mono', monospace; font-weight: 600; text-transform: uppercase;
  transition: all 0.1s;
}
.wave-btn.active { color: var(--accent); border-color: var(--accent); }

/* ── TABS ── */
.tabs { display: flex; gap: 3px; margin-bottom: 0; }
.tab-btn {
  flex: 1; padding: 9px 6px; text-align: center; cursor: pointer;
  background: var(--panel); border: 2px solid var(--border);
  border-bottom: none; border-radius: 4px 4px 0 0;
  font-family: 'Russo One', sans-serif; font-size: 0.7em;
  letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
  transition: all 0.15s; outline: none;
}
.tab-btn:hover { color: var(--text); background: var(--panel-dark); }
.tab-btn.active-synth { color: #fff; background: var(--cell-on-synth); border-color: var(--cell-on-synth); border-bottom: 2px solid var(--cell-on-synth); }
.tab-btn.active-drum { color: #fff; background: var(--cell-on-drum); border-color: var(--cell-on-drum); border-bottom: 2px solid var(--cell-on-drum); }
.tab-btn.active-drone { color: #fff; background: var(--cell-on-drone); border-color: var(--cell-on-drone); border-bottom: 2px solid var(--cell-on-drone); }

/* ── SAMPLE BAR ── */
.sample-bar {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 6px 10px;
  background: var(--panel-dark); border: 2px solid var(--border);
  border-top: none; border-radius: 0;
  min-height: 34px;
}
.sample-btn {
  background: var(--panel); border: 2px solid var(--border); color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace; font-size: 0.62em; font-weight: 600;
  padding: 4px 8px; border-radius: 3px; cursor: pointer;
  transition: all 0.1s; text-transform: uppercase; letter-spacing: 0.5px;
}
.sample-btn:hover { background: var(--cell-hover); color: var(--text); }
.sample-btn.loaded { border-color: var(--accent); color: var(--accent); }
.sample-name-tag { font-size: 0.6em; color: var(--accent); font-weight: 600; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sample-clear {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 0.7em; padding: 2px 4px; transition: color 0.1s;
}
.sample-clear:hover { color: var(--accent); }
.sample-bar-label { font-size: 0.55em; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

/* ── GRID ── */
.grid-wrap {
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: var(--panel-dark); border: 2px solid var(--border);
  border-top: none; border-radius: 0 0 4px 4px;
  padding: 6px;
}
.grid { display: flex; flex-direction: column; gap: 2px; min-width: fit-content; }
.grid-row { display: flex; align-items: center; gap: 2px; }

.row-label {
  width: 48px; min-width: 48px; font-size: 0.6em; font-weight: 600;
  color: var(--text-dim); text-align: right; padding-right: 6px;
  letter-spacing: 0.5px; overflow: hidden; white-space: nowrap;
}

.cell {
  width: 36px; height: 30px; min-width: 36px;
  background: var(--cell-off); border-radius: 2px;
  cursor: pointer; transition: background 0.06s, box-shadow 0.06s;
  border: 1px solid rgba(0,0,0,0.05);
  position: relative;
}
.cell:hover { background: var(--cell-hover); }
.cell.on-synth { background: var(--cell-on-synth); box-shadow: var(--led-glow) var(--cell-on-synth); }
.cell.on-drum { background: var(--cell-on-drum); box-shadow: var(--led-glow) var(--cell-on-drum); }
.cell.on-drone { background: var(--cell-on-drone); box-shadow: var(--led-glow) var(--cell-on-drone); }
.cell.playhead { background: var(--playhead); }
.cell.on-synth.playhead { filter: brightness(1.4); }
.cell.on-drum.playhead { filter: brightness(1.4); }
.cell.on-drone.playhead { filter: brightness(1.4); }
/* Beat grouping: darken every 4th group */
.cell.beat-off { background: #b0ab9f; }

.step-numbers { display: flex; align-items: center; gap: 2px; margin-bottom: 2px; }
.step-num {
  width: 36px; min-width: 36px; text-align: center;
  font-size: 0.5em; color: var(--text-dim); font-family: 'Russo One', sans-serif;
}
.step-num.beat-1 { color: var(--text); font-weight: 700; }
.step-num-pad { width: 48px; min-width: 48px; }

.row-clear {
  width: 20px; min-width: 20px; height: 20px;
  background: none; border: 1px solid var(--border); border-radius: 2px;
  color: var(--text-dim); font-size: 0.6em; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s; margin-left: 3px;
}
.row-clear:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── FOOTER ── */
.footer {
  display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; align-items: center;
}
.footer .btn { font-size: 0.65em; padding: 6px 10px; }
.footer-spacer { flex: 1; }
.footer .danger:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Hidden */
.hidden-input { display: none; }

/* Scrollbar */
::-webkit-scrollbar { height: 5px; width: 5px; }
::-webkit-scrollbar-track { background: var(--panel); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .app { padding: 4px; }
  .cell { width: 28px; height: 26px; min-width: 28px; }
  .step-num { width: 28px; min-width: 28px; }
  .row-label { width: 38px; min-width: 38px; font-size: 0.5em; }
  .step-num-pad { width: 38px; min-width: 38px; }
  .logo { font-size: 1.2em; }
  .transport { gap: 4px; padding: 6px 8px; }
  .btn { padding: 6px 8px; font-size: 0.7em; }
  .bpm-group input[type=range] { width: 50px; }
  .chevron-bar { height: 24px; }
  .header { padding: 6px 10px; }
}


.sequence-bar {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  padding: 8px 10px;
  background: var(--panel); border: 2px solid var(--border);
  border-top: none; border-bottom: none;
}
.sequence-label {
  font-size: 0.58em; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700;
}
.seq-tab, .seq-add {
  min-width: 46px; height: 34px;
  background: linear-gradient(180deg, #d9d2ca 0%, #b9b3aa 100%);
  border: 3px solid var(--border);
  border-radius: 5px;
  color: var(--text-dim);
  font-family: 'Russo One', sans-serif;
  font-size: 0.68em; letter-spacing: 1px;
  cursor: pointer;
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.18), 0 2px 0 rgba(255,255,255,0.2);
  transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.12s ease, color 0.12s ease;
}
.seq-tab:hover, .seq-add:hover { background: linear-gradient(180deg, #e2dad2 0%, #c0baaf 100%); color: var(--text); }
.seq-tab:active, .seq-add:active,
.btn:active, .tab-btn:active, .cell:active, .clip-tab:active, .pat-slot:active, .wave-btn:active, .sample-btn:active {
  transform: translateY(3px) scale(0.99);
  box-shadow: inset 0 2px 0 rgba(0,0,0,0.28);
}
.seq-tab.active {
  color: #fff; background: linear-gradient(180deg, #ea6871 0%, #c92c39 100%);
  border-color: var(--accent); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 0 0 10px rgba(230,57,70,0.28);
}
.btn, .sample-btn, .clip-tab, .pat-slot, .wave-btn, .tab-btn, .row-clear {
  user-select:none; -webkit-user-select:none;
}
.btn {
  padding: 11px 16px;
  border-width: 3px;
  border-radius: 5px;
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.18), 0 2px 0 rgba(255,255,255,0.18);
  transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.12s ease, color 0.12s ease;
}
.btn:hover { background: #d5cfc7; }
.tab-btn {
  padding: 12px 8px;
  border-width: 3px;
  border-radius: 6px 6px 0 0;
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.12);
  transition: transform 0.08s ease, background 0.14s ease, color 0.14s ease, box-shadow 0.08s ease;
}
.tab-btn.active-synth, .tab-btn.active-drum, .tab-btn.active-drone { transform: translateY(2px); }
.sample-btn, .clip-tab, .pat-slot, .wave-btn {
  border-width: 3px;
  min-height: 32px;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,0.16), 0 1px 0 rgba(255,255,255,0.18);
}
.clip-tabs { display:flex; gap:4px; flex-wrap:wrap; }
.clip-tab {
  min-width: 42px;
  background: linear-gradient(180deg, #ddd6ce 0%, #beb7ae 100%);
  color: var(--text-dim);
  border: 3px solid var(--border);
  border-radius: 5px;
  font-family:'Russo One', sans-serif;
  font-size:0.66em;
  letter-spacing:1px;
  padding: 6px 8px;
  cursor:pointer;
  transition: transform 0.08s ease, background 0.12s ease, color 0.12s ease, box-shadow 0.08s ease;
}
.clip-tab.active {
  color:#fff;
  background: linear-gradient(180deg, #8f8881 0%, #68625c 100%);
  border-color:#6d6761;
}
.cell {
  width: 40px; height: 34px; min-width: 40px;
  border-radius: 4px;
  border: 2px solid rgba(0,0,0,0.11);
  box-shadow: inset 0 -3px 0 rgba(0,0,0,0.18), 0 1px 0 rgba(255,255,255,0.18);
  transition: transform 0.05s ease, background 0.06s, box-shadow 0.06s, filter 0.08s;
}
.cell.playhead { outline: 2px solid rgba(0,0,0,0.12); outline-offset: -2px; }
.row-clear {
  width: 24px; min-width: 24px; height: 24px;
  border-width: 2px;
  box-shadow: inset 0 -2px 0 rgba(0,0,0,0.14), 0 1px 0 rgba(255,255,255,0.18);
}
.logo { letter-spacing: 3px; text-shadow: 3px 3px 0 rgba(0,0,0,0.08); }
.transport, .header, .options-inner, .sample-bar, .grid-wrap, .footer, .sequence-bar {
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 2px 0 rgba(0,0,0,0.04);
}
.panel-toggle .arrow.open { transform: rotate(90deg) translateX(1px); }
@media (max-width: 600px) {
  .cell { width: 32px; height: 30px; min-width: 32px; }
  .step-num { width: 32px; min-width: 32px; }
  .btn { padding: 10px 12px; font-size: 0.76em; }
  .clip-tab, .seq-tab, .seq-add, .sample-btn { min-height: 36px; }
}

/* ── VIDEO UPLOAD MODAL ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); z-index: 10000; 
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--panel); border: 3px solid var(--border); border-radius: 6px;
  padding: 20px; max-width: 380px; width: 90%; position: relative;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.modal h3 {
  font-family: 'Russo One', sans-serif; font-size: 0.9em;
  letter-spacing: 2px; margin-bottom: 12px; color: var(--text);
}
.modal p { font-size: 0.7em; color: var(--text-dim); margin-bottom: 10px; line-height: 1.5; }
.modal .btn { width: 100%; margin-bottom: 6px; text-align: center; }
.modal-close {
  position: absolute; top: 8px; right: 10px; background: none; border: none;
  color: var(--text-dim); font-size: 1.2em; cursor: pointer;
}
.modal-close:hover { color: var(--accent); }
.progress-bar {
  height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px;
  overflow: hidden; display: none;
}
.progress-bar.show { display: block; }
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  width: 0%; transition: width 0.3s;
}
.modal-status { font-size: 0.6em; color: var(--text-dim); margin-top: 6px; min-height: 1.2em; }

.trim-editor { display:none; margin-top:12px; }
.trim-editor.show { display:block; }
.trim-meta { display:flex; justify-content:space-between; gap:8px; font-size:0.62em; color:var(--text-dim); margin-bottom:6px; flex-wrap:wrap; }
.trim-wave-wrap { background: var(--panel-dark); border:2px solid var(--border); border-radius:4px; padding:8px; margin-bottom:8px; }
#trimWaveform { width:100%; height:90px; display:block; background:var(--bg); border-radius:3px; touch-action:none; }
.trim-controls { display:flex; flex-direction:column; gap:8px; margin-bottom:8px; }
.trim-row { display:flex; align-items:center; gap:8px; }
.trim-row label { width:42px; min-width:42px; font-size:0.65em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; font-weight:600; }
.trim-row input[type=range] { flex:1; accent-color: var(--accent); }
.trim-time { min-width:52px; text-align:right; font-size:0.65em; color:var(--text); font-weight:600; }
.trim-actions { display:flex; gap:6px; flex-wrap:wrap; }
.trim-actions .btn { flex:1 1 110px; }
.segment-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:6px; }
.segment-pill { font-size:0.62em; color:var(--text-dim); padding:4px 8px; border:1px solid var(--border); border-radius:999px; }
.clip-tabs { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
.clip-tab { background: var(--panel-dark); border:2px solid var(--border); color:var(--text-dim); font-size:0.58em; padding:3px 6px; border-radius:3px; cursor:pointer; font-family:'IBM Plex Mono', monospace; font-weight:600; }
.clip-tab.active { color:#fff; background:var(--accent); border-color:var(--accent); }
.sample-actions { display:flex; gap:4px; flex-wrap:wrap; margin-left:6px; }
.sample-actions .sample-btn { padding:3px 6px; font-size:0.58em; }
.library-wrap { margin-top:10px; border-top:1px solid rgba(0,0,0,0.08); padding-top:10px; }

<script>

// ─── AUDIO ENGINE ───
let audioCtx = null, masterGain = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.75;

    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -16;
    comp.ratio.value = 4;
    comp.attack.value = 0.003;
    comp.release.value = 0.18;

    const limiter = audioCtx.createDynamicsCompressor();
    limiter.threshold.value = -6;
    limiter.knee.value = 0;
    limiter.ratio.value = 14;
    limiter.attack.value = 0.002;
    limiter.release.value = 0.09;

    masterGain.connect(comp);
    comp.connect(limiter);
    limiter.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// ─── SCALES ───
const SCALES = {
  major:[0,2,4,5,7,9,11,12], minor:[0,2,3,5,7,8,10,12],
  pentatonic:[0,2,4,7,9,12,14,16], blues:[0,3,5,6,7,10,12,15],
  dorian:[0,2,3,5,7,9,10,12], phrygian:[0,1,3,5,7,8,10,12],
  mixolydian:[0,2,4,5,7,9,10,12], wholetone:[0,2,4,6,8,10,12,14],
};
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ROOT_FREQ = 261.63;

function getFreq(root, degree, scale) {
  const s = SCALES[scale]||SCALES.major;
  const semi = s[degree % s.length] + Math.floor(degree / s.length) * 12;
  return ROOT_FREQ * Math.pow(2, (root + semi) / 12);
}
function getNoteName(root, degree, scale) {
  const s = SCALES[scale]||SCALES.major;
  const semi = s[degree % s.length];
  const idx = (root + semi) % 12;
  const oct = 4 + Math.floor((root + semi + Math.floor(degree / s.length) * 12) / 12);
  return NOTE_NAMES[idx] + oct;
}

// ─── DRUM SYNTH ───
const DRUM_NAMES = ['KICK','SNARE','HH-CL','HH-OP','CLAP','TOM-L','TOM-H','RIM'];

function createNoise(dur) {
  const len = audioCtx.sampleRate * dur;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource(); src.buffer = buf; return src;
}

function playDrumSynth(type, vol=1) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain(); g.gain.value = vol; g.connect(masterGain);
  switch(type) {
    case 0: { // Kick
      const o = audioCtx.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(40,t+0.12);
      const e = audioCtx.createGain(); e.gain.setValueAtTime(1,t); e.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.connect(e); e.connect(g); o.start(t); o.stop(t+0.4);
      const c = audioCtx.createOscillator(); c.type='sine'; c.frequency.value=800;
      const cg = audioCtx.createGain(); cg.gain.setValueAtTime(0.6,t); cg.gain.exponentialRampToValueAtTime(0.001,t+0.02);
      c.connect(cg); cg.connect(g); c.start(t); c.stop(t+0.02); break;
    }
    case 1: { // Snare
      const n = createNoise(0.2); const nf = audioCtx.createBiquadFilter();
      nf.type='bandpass'; nf.frequency.value=3000; nf.Q.value=0.8;
      const ng = audioCtx.createGain(); ng.gain.setValueAtTime(0.7,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.18);
      n.connect(nf); nf.connect(ng); ng.connect(g); n.start(t); n.stop(t+0.2);
      const o = audioCtx.createOscillator(); o.type='triangle'; o.frequency.value=180;
      const og = audioCtx.createGain(); og.gain.setValueAtTime(0.5,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.08);
      o.connect(og); og.connect(g); o.start(t); o.stop(t+0.08); break;
    }
    case 2: { // HH Closed
      const n = createNoise(0.08); const f = audioCtx.createBiquadFilter();
      f.type='highpass'; f.frequency.value=7000;
      const e = audioCtx.createGain(); e.gain.setValueAtTime(0.4,t); e.gain.exponentialRampToValueAtTime(0.001,t+0.06);
      n.connect(f); f.connect(e); e.connect(g); n.start(t); n.stop(t+0.08); break;
    }
    case 3: { // HH Open
      const n = createNoise(0.3); const f = audioCtx.createBiquadFilter();
      f.type='highpass'; f.frequency.value=6000;
      const e = audioCtx.createGain(); e.gain.setValueAtTime(0.35,t); e.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      n.connect(f); f.connect(e); e.connect(g); n.start(t); n.stop(t+0.3); break;
    }
    case 4: { // Clap
      for (let i=0;i<3;i++) {
        const n=createNoise(0.04); const f=audioCtx.createBiquadFilter();
        f.type='bandpass'; f.frequency.value=2500; f.Q.value=1.5;
        const e=audioCtx.createGain(); e.gain.setValueAtTime(0,t+i*0.012);
        e.gain.linearRampToValueAtTime(0.5,t+i*0.012+0.003);
        e.gain.exponentialRampToValueAtTime(0.001,t+0.15);
        n.connect(f); f.connect(e); e.connect(g); n.start(t+i*0.012); n.stop(t+0.15);
      } break;
    }
    case 5: { // Tom Low
      const o=audioCtx.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(70,t+0.15);
      const e=audioCtx.createGain(); e.gain.setValueAtTime(0.8,t); e.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.connect(e); e.connect(g); o.start(t); o.stop(t+0.3); break;
    }
    case 6: { // Tom High
      const o=audioCtx.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(140,t+0.1);
      const e=audioCtx.createGain(); e.gain.setValueAtTime(0.7,t); e.gain.exponentialRampToValueAtTime(0.001,t+0.2);
      o.connect(e); e.connect(g); o.start(t); o.stop(t+0.2); break;
    }
    case 7: { // Rim
      const o=audioCtx.createOscillator(); o.type='triangle'; o.frequency.value=820;
      const e=audioCtx.createGain(); e.gain.setValueAtTime(0.6,t); e.gain.exponentialRampToValueAtTime(0.001,t+0.04);
      o.connect(e); e.connect(g); o.start(t); o.stop(t+0.04); break;
    }
  }
}

// ─── SYNTH ───
let synthWaveform = 'sawtooth';
const synthEnv = { a: 0.01, d: 0.15, s: 0.3, r: 0.2 };

function playSynth(freq, vol=1) {
  ensureAudio(); const t = audioCtx.currentTime;
  const o1 = audioCtx.createOscillator(); o1.type = synthWaveform; o1.frequency.value = freq;
  const o2 = audioCtx.createOscillator(); o2.type = synthWaveform; o2.frequency.value = freq * 1.003;
  const filt = audioCtx.createBiquadFilter(); filt.type='lowpass';
  filt.frequency.setValueAtTime(freq*6,t); filt.frequency.exponentialRampToValueAtTime(freq*1.5,t+synthEnv.d+synthEnv.r); filt.Q.value=2;
  const eg = audioCtx.createGain();
  const dur = synthEnv.a + synthEnv.d + 0.1 + synthEnv.r;
  eg.gain.setValueAtTime(0,t);
  eg.gain.linearRampToValueAtTime(vol*0.3,t+synthEnv.a);
  eg.gain.linearRampToValueAtTime(vol*synthEnv.s*0.3,t+synthEnv.a+synthEnv.d);
  eg.gain.linearRampToValueAtTime(0,t+dur);
  o1.connect(filt); o2.connect(filt); filt.connect(eg); eg.connect(masterGain);
  o1.start(t); o1.stop(t+dur); o2.start(t); o2.stop(t+dur);
}

// ─── DRONE ───
const activeDrones = {};

function startDrone(droneKey, freq, vol=1) {
  ensureAudio();
  stopDrone(droneKey);
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain();
  const targetVol = Math.min(0.055, Math.max(0.018, vol * 0.045));
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(targetVol, t + 0.45);

  const base = audioCtx.createOscillator();
  base.type = 'triangle';
  base.frequency.value = freq;

  const shimmer = audioCtx.createOscillator();
  shimmer.type = 'sawtooth';
  shimmer.frequency.value = freq * 0.5;
  shimmer.detune.value = 5;

  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = Math.max(280, freq * 2.2);
  filt.Q.value = 0.7;

  const wobble = audioCtx.createOscillator();
  wobble.type = 'sine';
  wobble.frequency.value = 0.11 + Math.random() * 0.07;

  const wobbleGain = audioCtx.createGain();
  wobbleGain.gain.value = Math.max(18, freq * 0.22);
  wobble.connect(wobbleGain);
  wobbleGain.connect(filt.frequency);

  const shimmerGain = audioCtx.createGain();
  shimmerGain.gain.value = 0.25;
  shimmer.connect(shimmerGain);
  shimmerGain.connect(filt);

  base.connect(filt);
  filt.connect(g);
  g.connect(masterGain);

  [base, shimmer, wobble].forEach(o => o.start(t));
  activeDrones[droneKey] = { oscs: [base, shimmer, wobble], gain: g, filter: filt };
}
function stopDrone(droneKey) {
  const d = activeDrones[droneKey];
  if (!d) return;
  const t = audioCtx.currentTime;
  d.gain.gain.cancelScheduledValues(t);
  d.gain.gain.setValueAtTime(d.gain.gain.value, t);
  d.gain.gain.linearRampToValueAtTime(0, t + 0.28);
  setTimeout(() => {
    d.oscs.forEach(o => { try { o.stop(); } catch (e) {} });
    delete activeDrones[droneKey];
  }, 340);
}
function stopAllDrones() { Object.keys(activeDrones).forEach(stopDrone); }

// ─── SAMPLE MANAGEMENT ───
const loadedSamples = { synth: null, drum: {}, drone: null };
let sampleLoadTarget = null;
const activeOneShots = new Set();

function trackOneShot(source) {
  if (!source) return source;
  activeOneShots.add(source);
  const cleanup = () => activeOneShots.delete(source);
  source.addEventListener('ended', cleanup, { once: true });
  return source;
}

function stopTrackedOneShots() {
  activeOneShots.forEach(source => {
    try { source.stop(); } catch (e) {}
  });
  activeOneShots.clear();
}

function playSample(buffer, rate=1, vol=1) {
  ensureAudio();
  const src = trackOneShot(audioCtx.createBufferSource()); src.buffer = buffer; src.playbackRate.value = rate;
  const g = audioCtx.createGain(); g.gain.value = vol * 0.5;
  src.connect(g); g.connect(masterGain); src.start();
}
function playClipSelectionPreview(clip, clipIndex = 0) {
  ensureAudio();
  stopTrackedOneShots();
  if (clip && clip.buffer) {
    const src = trackOneShot(audioCtx.createBufferSource());
    src.buffer = clip.buffer;
    const g = audioCtx.createGain();
    const now = audioCtx.currentTime;
    const fadeOutAt = Math.max(0.08, clip.buffer.duration - 0.12);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.linearRampToValueAtTime(0.24, now + 0.01);
    if (clip.buffer.duration > 0.14) {
      g.gain.setValueAtTime(0.24, now + fadeOutAt);
      g.gain.exponentialRampToValueAtTime(0.0001, now + clip.buffer.duration);
    }
    src.connect(g);
    g.connect(masterGain);
    src.start(now);
    return;
  }
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  const now = audioCtx.currentTime;
  osc.type = 'triangle';
  osc.frequency.value = 220 + (clipIndex * 38);
  g.gain.setValueAtTime(0.0001, now);
  g.gain.linearRampToValueAtTime(0.18, now + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
  osc.connect(g); g.connect(masterGain);
  osc.start(now); osc.stop(now + 0.18);
}

function normalizeSampleData(sampleData) {

    return { ...sampleData, activeClip, buffer: sampleData.clips[activeClip].buffer };
  }
  return sampleData;
}
function getActiveSampleData(sampleData) {

function getTargetSampleData(target) {

  return null;
}
function setTargetSampleData(target, sampleData) {
  const normalized = normalizeSampleData(sampleData);
  ensureClipPatternBanks(normalized);
  if (target === 'synth') loadedSamples.synth = normalized;
  else if (target === 'drone') loadedSamples.drone = normalized;

function clearTargetSampleData(target) {

function createEmptyGridMatrix() {

  if (!sampleData || !sampleData.clips || !sampleData.clips.length) return sampleData;
  if (!sampleData.clipPatterns || sampleData.clipPatterns.length !== sampleData.clips.length) {
    sampleData.clipPatterns = sampleData.clips.map(() => Array.from({length:MAX_PATTERNS}, () => createEmptyGridMatrix()));
  }
  sampleData.clipPatterns.forEach((bank, idx) => {
    while (bank.length < MAX_PATTERNS) bank.push(createEmptyGridMatrix());

}

function formatSeconds(sec) {
  return `${sec.toFixed(2)}s`;
}
function copySegmentToBuffer(sourceBuffer, startSec, endSec) {
  const sampleRate = sourceBuffer.sampleRate;
  const start = Math.max(0, Math.floor(startSec * sampleRate));
  const end = Math.max(start + 1, Math.min(sourceBuffer.length, Math.ceil(endSec * sampleRate)));
  const length = end - start;
  const out = audioCtx.createBuffer(sourceBuffer.numberOfChannels, length, sampleRate);
  for (let ch = 0; ch < sourceBuffer.numberOfChannels; ch++) {
    out.getChannelData(ch).set(sourceBuffer.getChannelData(ch).slice(start, end));
  }
  return out;
}
function getWavePeaks(buffer, count = 120) {
  if (!buffer) return [];
  if (pendingExtract.cachedPeaks && pendingExtract.cachedPeaks.length === count) return pendingExtract.cachedPeaks;
  const data = buffer.getChannelData(0);
  const block = Math.max(1, Math.floor(data.length / count));
  const peaks = [];
  for (let i = 0; i < count; i++) {
    let sum = 0;
    const start = i * block;
    const end = Math.min(data.length, start + block);
    for (let j = start; j < end; j++) sum = Math.max(sum, Math.abs(data[j]));
    peaks.push(sum);
  }
  pendingExtract.cachedPeaks = peaks;
  return peaks;
}
function drawTrimWaveform() {
  const canvas = document.getElementById('trimWaveform');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const width = canvas.clientWidth || 320;
  const height = canvas.clientHeight || 90;
  canvas.width = Math.floor(width * dpr);
  canvas.height = Math.floor(height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
  ctx.fillRect(0, 0, width, height);

  if (!pendingExtract.sourceBuffer) return;

  const peaks = getWavePeaks(pendingExtract.sourceBuffer, 140);
  const mid = height / 2;
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();
  peaks.forEach((peak, i) => {
    const x = (i / peaks.length) * width;
    const barH = Math.max(2, peak * (height * 0.86));
    ctx.fillRect(x, mid - barH / 2, Math.max(1, width / peaks.length - 1), barH);
  });

  const duration = pendingExtract.sourceBuffer.duration || 1;
  const startRatio = pendingExtract.trimStart / duration;
  const endRatio = pendingExtract.trimEnd / duration;

  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(0, 0, startRatio * width, height);
  ctx.fillRect(endRatio * width, 0, width - endRatio * width, height);

  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  ctx.lineWidth = 2;
  ctx.strokeRect(startRatio * width, 1, Math.max(2, (endRatio - startRatio) * width), height - 2);
}
function refreshPendingTrimUi() {

  if (pendingExtract.trimEnd < pendingExtract.trimStart + 0.02) pendingExtract.trimEnd = Math.min(duration, pendingExtract.trimStart + 0.02);

function autoSegmentCurrentFile() {
  if (!pendingExtract.sourceBuffer) return;
  const buffer = pendingExtract.sourceBuffer;
  const data = buffer.getChannelData(0);
  const sr = buffer.sampleRate;
  const windowSize = Math.max(128, Math.floor(sr * 0.08));
  const energies = [];
  for (let i = 0; i < data.length; i += windowSize) {
    let sum = 0;
    const end = Math.min(data.length, i + windowSize);
    for (let j = i; j < end; j++) sum += Math.abs(data[j]);
    energies.push(sum / Math.max(1, end - i));
  }
  const maxEnergy = Math.max(...energies, 0.00001);
  const threshold = Math.max(0.012, maxEnergy * 0.22);
  const minFrames = Math.max(2, Math.round((0.18 * sr) / windowSize));
  const gapFrames = Math.max(1, Math.round((0.09 * sr) / windowSize));

  const segments = [];
  let start = null;
  let silentRun = 0;
  for (let i = 0; i < energies.length; i++) {
    const active = energies[i] >= threshold;
    if (active && start === null) start = i;
    if (start !== null) {
      if (!active) silentRun += 1;
      else silentRun = 0;
      if (silentRun >= gapFrames) {
        const endIdx = i - silentRun + 1;
        if (endIdx - start >= minFrames) {
          segments.push({ start: start * windowSize / sr, end: Math.min(buffer.duration, endIdx * windowSize / sr) });
        }
        start = null;
        silentRun = 0;
      }
    }
  }
  if (start !== null) {
    const endIdx = energies.length;
    if (endIdx - start >= minFrames) segments.push({ start: start * windowSize / sr, end: buffer.duration });
  }

  const merged = [];
  segments.forEach(seg => {
    if (!merged.length) { merged.push(seg); return; }
    const prev = merged[merged.length - 1];
    if (seg.start - prev.end < 0.06) prev.end = seg.end;
    else merged.push(seg);
  });

  const clipped = (merged.length ? merged : [{ start: 0, end: Math.min(buffer.duration, Math.max(0.25, buffer.duration)) }])
    .map(seg => ({ start: Math.max(0, seg.start), end: Math.max(seg.start + 0.05, seg.end) }))
    .filter(seg => seg.end - seg.start >= 0.05)
    .slice(0, 10);

  pendingExtract.segments = clipped;
  pendingExtract.segmentIndex = 0;
  if (clipped[0]) {
    pendingExtract.trimStart = clipped[0].start;
    pendingExtract.trimEnd = clipped[0].end;
  }
  document.getElementById('extractStatus').textContent = `✓ Auto-snipped ${clipped.length} clip${clipped.length === 1 ? '' : 's'}`;
  refreshPendingTrimUi();
}
function applyPendingSegment(index) {
  if (!pendingExtract.segments[index]) return;
  pendingExtract.segmentIndex = index;
  const seg = pendingExtract.segments[index];
  pendingExtract.trimStart = seg.start;
  pendingExtract.trimEnd = seg.end;
  refreshPendingTrimUi();
}
function prevSegment() {
  if (!pendingExtract.segments.length) return;
  const nextIndex = (pendingExtract.segmentIndex - 1 + pendingExtract.segments.length) % pendingExtract.segments.length;
  applyPendingSegment(nextIndex);
}
function nextSegment() {
  if (!pendingExtract.segments.length) return;
  const nextIndex = (pendingExtract.segmentIndex + 1) % pendingExtract.segments.length;
  applyPendingSegment(nextIndex);
}

function openLibraryDb() {
  if (libraryDbPromise) return libraryDbPromise;
  libraryDbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(LIBRARY_DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(LIBRARY_STORE)) {
        db.createObjectStore(LIBRARY_STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return libraryDbPromise;
}
async function saveFileToLibrary(file) {
  try {
    const db = await openLibraryDb();
    const tx = db.transaction(LIBRARY_STORE, 'readwrite');
    const id = `${file.name}_${file.size}_${file.lastModified}`;
    tx.objectStore(LIBRARY_STORE).put({
      id,
      name: file.name,
      size: file.size,
      type: file.type,
      lastModified: file.lastModified,
      lastUsed: Date.now(),
      fileBlob: file,
    });
    await new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    refreshLibraryList();
  } catch (err) {
    console.warn('Library save failed', err);
  }
}
async function getSavedLibraryItems() {
  try {
    const db = await openLibraryDb();
    const tx = db.transaction(LIBRARY_STORE, 'readonly');
    const req = tx.objectStore(LIBRARY_STORE).getAll();
    return await new Promise((resolve, reject) => {
      req.onsuccess = () => resolve((req.result || []).sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0)));
      req.onerror = () => reject(req.error);
    });
  } catch (err) {
    console.warn('Library read failed', err);
    return [];
  }
}
async function refreshLibraryList() {
  const list = document.getElementById('libraryList');
  if (!list) return;
  const items = await getSavedLibraryItems();
  if (!items.length) {
    list.innerHTML = '<div class="library-empty">No saved files yet</div>';
    return;
  }
  list.innerHTML = items.map(item => `
    <div class="library-item">
      <div style="flex:1; min-width:0;">
        <div class="library-name">${item.name}</div>
        <div class="library-meta">${((item.size || 0) / (1024 * 1024)).toFixed(1)} MB</div>
      </div>
      <button class="sample-btn" onclick="reopenSavedFile('${item.id.replace(/'/g, "\\'")}')">Open</button>
    </div>
  `).join('');
}
async function reopenSavedFile(id) {
  const db = await openLibraryDb();
  const tx = db.transaction(LIBRARY_STORE, 'readwrite');
  const store = tx.objectStore(LIBRARY_STORE);
  const item = await new Promise((resolve, reject) => {
    const req = store.get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  if (!item || !item.fileBlob) return;
  item.lastUsed = Date.now();
  store.put(item);
  await new Promise(resolve => { tx.oncomplete = resolve; });
  await processSelectedMediaFile(item.fileBlob);
}
async function clearSavedLibrary() {
  try {
    const db = await openLibraryDb();
    const tx = db.transaction(LIBRARY_STORE, 'readwrite');
    tx.objectStore(LIBRARY_STORE).clear();
    await new Promise(resolve => { tx.oncomplete = resolve; });
    refreshLibraryList();
  } catch (err) {
    console.warn('Library clear failed', err);
  }
}

function audioBufferToWavBlob(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const bitDepth = 16;
  const bytesPerSample = bitDepth / 8;
  const blockAlign = numChannels * bytesPerSample;
  const dataSize = buffer.length * blockAlign;
  const arrayBuffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(arrayBuffer);

  const writeString = (offset, str) => {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  };

  writeString(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * blockAlign, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitDepth, true);
  writeString(36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i = 0; i < buffer.length; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      let sample = buffer.getChannelData(ch)[i];
      sample = Math.max(-1, Math.min(1, sample));
      view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
      offset += 2;
    }
  }
  return new Blob([arrayBuffer], { type: 'audio/wav' });
}
function downloadBlob(blob, fileName) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 500);
}
function slugifyFileName(name) {
  return (name || 'clip').replace(/\.[^.]+$/, '').replace(/[^a-z0-9]+/gi, '-').replace(/^-+|-+$/g, '').toLowerCase() || 'clip';
}
function downloadActiveClip(target) {
  const sampleData = getTargetSampleData(target);
  const active = getActiveSampleData(sampleData);
  if (!active || !active.buffer) return;
  const clipNo = active.clips && active.clips.length ? (active.activeClip || 0) + 1 : 1;
  downloadBlob(audioBufferToWavBlob(active.buffer), `${slugifyFileName(active.name || target)}-c${clipNo}.wav`);
}
function downloadAllClips(target) {
  const sampleData = getTargetSampleData(target);
  if (!sampleData) return;
  if (sampleData.clips && sampleData.clips.length) {
    sampleData.clips.forEach((clip, idx) => {
      setTimeout(() => downloadBlob(audioBufferToWavBlob(clip.buffer), `${slugifyFileName(sampleData.name || target)}-c${idx + 1}.wav`), idx * 120);
    });
    return;
  }
  const active = getActiveSampleData(sampleData);
  if (active?.buffer) downloadBlob(audioBufferToWavBlob(active.buffer), `${slugifyFileName(active.name || target)}.wav`);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('videoInput').setAttribute('accept', 'audio/*,video/*');
  document.getElementById('videoInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) await processSelectedMediaFile(file);
    e.target.value = '';
  });

  const startInput = document.getElementById('trimStart');
  const endInput = document.getElementById('trimEnd');
  startInput.addEventListener('input', (e) => {
    if (!pendingExtract.sourceBuffer) return;
    pendingExtract.trimStart = (parseInt(e.target.value) / 1000) * pendingExtract.sourceBuffer.duration;
    pendingExtract.segmentIndex = -1;
    refreshPendingTrimUi();
  });
  endInput.addEventListener('input', (e) => {
    if (!pendingExtract.sourceBuffer) return;
    pendingExtract.trimEnd = (parseInt(e.target.value) / 1000) * pendingExtract.sourceBuffer.duration;
    pendingExtract.segmentIndex = -1;
    refreshPendingTrimUi();
  });

  refreshLibraryList();

  // Init UI
  initScaleSelect();
  initWaveBtns();
  renderPatternTabs();
  renderStepNumbers();
  updateSampleBar();
  renderGrid();
});
// ─── SEQUENCER STATE ───
const NUM_ROWS = 8;
const MAX_PATTERNS = 8;
let visiblePatternTabs = 4;
let numSteps = 16, currentTab = 'synth', currentScale = 'minor', rootNote = 0;
let bpm = 120, swing = 0, playing = false, currentStep = -1, stepTimer = null, currentPattern = 0;

const patterns = [];
const rowVolumes = { synth: [], drum: [], drone: [] };
function initPattern() {
  return {
    synth: createEmptyGridMatrix(),
    drum:  createEmptyGridMatrix(),
    drone: createEmptyGridMatrix(),
  };
}
for (let i=0;i<MAX_PATTERNS;i++) patterns.push(initPattern());
for (const t of ['synth','drum','drone']) for (let r=0;r<NUM_ROWS;r++) rowVolumes[t].push(0.8);

// ─── PLAYBACK ───
function togglePlay() {
  ensureAudio();
  if (playing) { stopSeq(); return; }
  playing = true; currentStep = -1;
  document.getElementById('playBtn').classList.add('playing');
  document.getElementById('playBtn').textContent = '❚❚ Pause';
  scheduleNext();
}
function stopSeq() {
  playing = false; if (stepTimer) clearTimeout(stepTimer); stepTimer = null;
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('playBtn').textContent = '▶ Play';
  stopAllDrones(); currentStep = -1; renderGrid();
}

function stopAllAudio() {
  stopSeq();
  stopTrackedOneShots();
}

function scheduleNext() {
  if (!playing) return;
  currentStep = (currentStep + 1) % numSteps;
  const synthPat = getPatternGrid('synth');
  const drumPat = getPatternGrid('drum');
  const dronePat = getPatternGrid('drone');
  const synthTracks = getAllClipTracks('synth');
  const droneTracks = getAllClipTracks('drone');

  // Synth
  if (synthTracks.length) {
    synthTracks.forEach(track => {
      for (let r = 0; r < NUM_ROWS; r++) {
        if (track.pattern[r][currentStep]) {
          const vol = rowVolumes.synth[r], deg = NUM_ROWS - 1 - r;
          const semi = (SCALES[currentScale] || SCALES.major)[deg % 8];
          playSample(track.clip.buffer, Math.pow(2, semi / 12), vol);
        }
      }
    });
  } else {
    for (let r=0;r<NUM_ROWS;r++) {
      if (synthPat[r][currentStep]) {
        const vol=rowVolumes.synth[r], deg=NUM_ROWS-1-r;
        if (loadedSamples.synth) {
          const semi=(SCALES[currentScale]||SCALES.major)[deg%8];
          playSample(getActiveSampleData(loadedSamples.synth).buffer, Math.pow(2,semi/12), vol);
        } else playSynth(getFreq(rootNote,deg,currentScale), vol);
      }
    }
  }
  // Drums
  for (let r=0;r<NUM_ROWS;r++) {
    if (drumPat[r][currentStep]) {
      const vol=rowVolumes.drum[r];
      if (loadedSamples.drum[r]) playSample(getActiveSampleData(loadedSamples.drum[r]).buffer,1,vol);
      else playDrumSynth(r,vol);
    }
  }
  // Drones
  if (droneTracks.length) {
    const activeKeys = new Set();
    droneTracks.forEach(track => {
      for (let r = 0; r < NUM_ROWS; r++) {
        const deg = NUM_ROWS - 1 - r;
        const vol = rowVolumes.drone[r];
        const key = `drone_${track.clipIndex}_${r}`;
        if (track.pattern[r][currentStep]) {
          activeKeys.add(key);
          if (!activeDrones[key]) {
            const semi = (SCALES[currentScale] || SCALES.major)[deg % 8];
            ensureAudio();
            const src = audioCtx.createBufferSource();
            src.buffer = track.clip.buffer;
            src.playbackRate.value = Math.pow(2, semi / 12);
            src.loop = true;
            const filt = audioCtx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.value = Math.max(260, getFreq(rootNote, deg, currentScale) * 1.8);
            filt.Q.value = 0.6;
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(Math.min(0.065, Math.max(0.02, vol * 0.05)), audioCtx.currentTime + 0.35);
            src.connect(filt); filt.connect(g); g.connect(masterGain); src.start();
            activeDrones[key] = { oscs: [src], gain: g, filter: filt };
          }
        }
      }
    });
    Object.keys(activeDrones).forEach(key => {
      if (key.startsWith('drone_') && !activeKeys.has(key)) stopDrone(key);
    });
  } else {
    for (let r = 0; r < NUM_ROWS; r++) {
      const deg = NUM_ROWS - 1 - r, freq = getFreq(rootNote, deg, currentScale), vol = rowVolumes.drone[r];
      const key = `drone_${r}`;
      if (dronePat[r][currentStep]) {
        if (loadedSamples.drone) {
          if (!activeDrones[key]) {
            const semi = (SCALES[currentScale] || SCALES.major)[deg % 8];
            ensureAudio();
            const src = audioCtx.createBufferSource();
            src.buffer = getActiveSampleData(loadedSamples.drone).buffer;
            src.playbackRate.value = Math.pow(2, semi / 12);
            src.loop = true;
            const filt = audioCtx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.value = Math.max(260, freq * 1.8);
            filt.Q.value = 0.6;
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(Math.min(0.065, Math.max(0.02, vol * 0.05)), audioCtx.currentTime + 0.35);
            src.connect(filt); filt.connect(g); g.connect(masterGain); src.start();
            activeDrones[key] = { oscs: [src], gain: g, filter: filt };
          }
        } else startDrone(key, freq, vol);
      } else stopDrone(key);
    }
  }

  renderGrid();
  const beatMs = (60000/bpm)/4;
  let delay = beatMs;
  if (currentStep%2===0 && swing>0) delay=beatMs*(1+swing/200);
  else if (currentStep%2===1 && swing>0) delay=beatMs*(1-swing/200);
  stepTimer = setTimeout(scheduleNext, delay);
}

// ─── UI ───
function getRowLabel(tab, r) {
  if (tab==='drum') {
    if (loadedSamples.drum[r]) { const n=getSampleDisplayName(loadedSamples.drum[r], DRUM_NAMES[r]); return n.length>6?n.substring(0,6):n; }
    return DRUM_NAMES[r];
  }
  return getNoteName(rootNote, NUM_ROWS-1-r, currentScale);
}

function renderStepNumbers() {
  const c=document.getElementById('stepNumbers');
  let h='<div class="step-num-pad"></div>';
  for (let s=0;s<numSteps;s++) h+=`<div class="step-num${s%4===0?' beat-1':''}">${s+1}</div>`;
  c.innerHTML=h;
}

function renderGrid() {
  const container=document.getElementById('grid');
  const pat=getPatternGrid(currentTab);
  const cls=`on-${currentTab}`;
  let html='';
  for (let r=0;r<NUM_ROWS;r++) {
    html+='<div class="grid-row">';
    html+=`<div class="row-label">${getRowLabel(currentTab,r)}</div>`;
    for (let s=0;s<numSteps;s++) {
      const on=pat[r][s];
      const ph=(s===currentStep&&playing)?' playhead':'';
      const beat=(s%8>=4)?' beat-off':'';
      html+=`<div class="cell${on?` ${cls}`:''}${ph}${!on?beat:''}" data-r="${r}" data-s="${s}"></div>`;
    }
    html+=`<button class="row-clear" onclick="clearRow(${r})" title="Clear row">✕</button>`;
    html+='</div>';
  }
  container.innerHTML=html;

  // Pointer-based painting for better mobile taps + drag
  let isDrawing = false, drawMode = true, previewedRow = null;

  const paintCell = (target, shouldPreview = false) => {
    if (!target || !target.classList.contains('cell')) return;
    const r = parseInt(target.dataset.r);
    const s = parseInt(target.dataset.s);
    pat[r][s] = drawMode;
    const beat = (s % 8 >= 4) ? ' beat-off' : '';
    target.className = `cell${drawMode ? ` ${cls}` : ''}${(s === currentStep && playing) ? ' playhead' : ''}${!drawMode ? beat : ''}`;
    if (shouldPreview && drawMode && !playing && previewedRow !== r) {
      previewedRow = r;
      previewSound(currentTab, r);
    }
  };

  container.onpointerdown = (e) => {
    const target = e.target.closest('.cell');
    if (!target) return;
    e.preventDefault();
    const r = parseInt(target.dataset.r);
    const s = parseInt(target.dataset.s);
    isDrawing = true;
    previewedRow = null;
    drawMode = !pat[r][s];
    if (container.setPointerCapture) {
      try { container.setPointerCapture(e.pointerId); } catch (_) {}
    }
    paintCell(target, true);
  };

  container.onpointermove = (e) => {
    if (!isDrawing) return;
    const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('.cell');
    if (!target || !container.contains(target)) return;
    e.preventDefault();
    paintCell(target, false);
  };

  const stopDrawing = (e) => {
    isDrawing = false;
    previewedRow = null;
    if (e && container.releasePointerCapture) {
      try { container.releasePointerCapture(e.pointerId); } catch (_) {}
    }
  };

  container.onpointerup = stopDrawing;
  container.onpointercancel = stopDrawing;
  container.onpointerleave = (e) => {
    if (e.buttons === 0) stopDrawing(e);
  };
}


function previewSound(tab,row) {
  ensureAudio();
  if (tab==='synth') {
    const deg=NUM_ROWS-1-row;
    if (loadedSamples.synth) {
      const semi=(SCALES[currentScale]||SCALES.major)[deg%8];
      playSample(getActiveSampleData(loadedSamples.synth).buffer,Math.pow(2,semi/12),rowVolumes.synth[row]);
    } else playSynth(getFreq(rootNote,deg,currentScale),rowVolumes.synth[row]);
  } else if (tab==='drum') {
    if (loadedSamples.drum[row]) playSample(getActiveSampleData(loadedSamples.drum[row]).buffer,1,rowVolumes.drum[row]);
    else playDrumSynth(row,rowVolumes.drum[row]);
  }
}

// ─── SAMPLE BAR (per tab) ───
function clipHasProgrammedSteps(tab, clipIndex) {
  const sampleData = tab === 'synth' ? loadedSamples.synth : loadedSamples.drone;
  if (!sampleData || !sampleData.clips || !sampleData.clipPatterns || !sampleData.clipPatterns[clipIndex]) return false;
  const grid = sampleData.clipPatterns[clipIndex][currentPattern];
  if (!grid) return false;
  for (let r = 0; r < NUM_ROWS; r++) {
    for (let s = 0; s < numSteps; s++) {
      if (grid[r][s]) return true;
    }
  }
  return false;
}
function updateSampleBar() {
  const bar=document.getElementById('sampleBar');
  if (currentTab==='synth') {
    const s=loadedSamples.synth;
    const multiClip = s && s.clips && s.clips.length > 1;
    const clipTabs = multiClip
      ? `<div class="clip-tabs">${s.clips.map((clip,idx)=>`<button class="clip-tab${idx===(s.activeClip||0)?' active':''}${clipHasProgrammedSteps('synth', idx)?' has-steps':''}" onclick="setActiveClipForTarget('synth',${idx})" title="Tap to preview full clip">C${idx+1}</button>`).join('')}</div>`
      : '';
    const clipActions = s
      ? `<div class="sample-actions"><button class="sample-btn" onclick="downloadActiveClip('synth')">Save Clip</button>${multiClip ? `<button class="sample-btn" onclick="downloadAllClips('synth')">Save All</button>` : ''}</div>`
      : '';
    bar.innerHTML=`
      <span class="sample-bar-label">Sample:</span>
      <button class="sample-btn${s?' loaded':''}" onclick="openExtractModal('synth')">${s?'♫ Replace':'+ Load Audio/Video'}</button>
      ${s?`<span class="sample-name-tag">${getSampleDisplayName(s)}</span><button class="sample-clear" onclick="clearTargetSampleData('synth')">✕</button>`:''}
      ${clipActions}
      <span class="sample-bar-label" style="margin-left:auto;font-size:0.5em;opacity:0.6">${getClipPatternLabel('synth') || 'Auto-snip can build up to 10 clip tracks'}</span>
      ${clipTabs}
    `;
  } else if (currentTab==='drum') {
    bar.innerHTML=`
      <span class="sample-bar-label">Drums:</span>
      ${DRUM_NAMES.map((name,i)=>{
        const ld=loadedSamples.drum[i];
        const label=ld?getSampleDisplayName(ld, name).slice(0,7):name;
        return `<button class="sample-btn${ld?' loaded':''}" onclick="openExtractModal(${i})">${label}</button>`;
      }).join('')}
      <span class="sample-bar-label" style="margin-left:auto;font-size:0.5em;opacity:0.6">Each drum slot can also come from a trimmed clip</span>
    `;
  } else if (currentTab==='drone') {
    const s=loadedSamples.drone;
    const multiClip = s && s.clips && s.clips.length > 1;
    const clipTabs = multiClip
      ? `<div class="clip-tabs">${s.clips.map((clip,idx)=>`<button class="clip-tab${idx===(s.activeClip||0)?' active':''}${clipHasProgrammedSteps('drone', idx)?' has-steps':''}" onclick="setActiveClipForTarget('drone',${idx})" title="Tap to preview full clip">C${idx+1}</button>`).join('')}</div>`
      : '';
    const clipActions = s
      ? `<div class="sample-actions"><button class="sample-btn" onclick="downloadActiveClip('drone')">Save Clip</button>${multiClip ? `<button class="sample-btn" onclick="downloadAllClips('drone')">Save All</button>` : ''}</div>`
      : '';
    bar.innerHTML=`
      <span class="sample-bar-label">Sample:</span>
      <button class="sample-btn${s?' loaded':''}" onclick="openExtractModal('drone')">${s?'♫ Replace':'+ Load Audio/Video'}</button>
      ${s?`<span class="sample-name-tag">${getSampleDisplayName(s)}</span><button class="sample-clear" onclick="clearTargetSampleData('drone')">✕</button>`:''}
      ${clipActions}
      <span class="sample-bar-label" style="margin-left:auto;font-size:0.5em;opacity:0.6">${getClipPatternLabel('drone') || 'Auto-snip can build up to 10 clip tracks'}</span>
      ${clipTabs}
    `;
  }
}

// ─── TAB SWITCHING ───
function switchTab(tab) {
  if (currentTab==='drone'&&tab!=='drone') stopAllDrones();
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.className='tab-btn');
  document.getElementById(`tab-${tab}`).classList.add(`active-${tab}`);
  updateSampleBar(); renderGrid();
}

// ─── OPTIONS DRAWER ───
let optionsOpen = false;
function toggleOptions() {
  optionsOpen=!optionsOpen;
  document.getElementById('optionsDrawer').classList.toggle('open',optionsOpen);
  document.getElementById('optArrow').classList.toggle('open',optionsOpen);
}

function initScaleSelect() {
  const sel=document.getElementById('scaleSelect');
  sel.innerHTML=Object.keys(SCALES).map(s=>`<option value="${s}"${s===currentScale?' selected':''}>${s}</option>`).join('');
}
function initWaveBtns() {
  const c=document.getElementById('waveBtns');
  c.innerHTML=['sine','triangle','sawtooth','square'].map(w=>
    `<button class="wave-btn${synthWaveform===w?' active':''}" onclick="setWave('${w}')">${w.slice(0,3)}</button>`
  ).join('');
}
function setWave(w) { synthWaveform=w; initWaveBtns(); }

// ─── PATTERN ───
function switchPattern(idx) {
  if (idx < 0 || idx >= visiblePatternTabs) return;
  if(currentTab==='drone')stopAllDrones();
  currentPattern=idx;
  renderPatternTabs();
  renderGrid();
}

// ─── CONTROLS ───
function updateBPM(v) { bpm=parseInt(v); document.getElementById('bpmVal').textContent=v; }
function updateSwing(v) { swing=parseInt(v); document.getElementById('swingVal').textContent=v+'%'; }
function updateSteps(v) { numSteps=parseInt(v); if(currentStep>=numSteps)currentStep=0; renderStepNumbers(); renderGrid(); }
document.getElementById('masterVol').addEventListener('input',e=>{ if(masterGain)masterGain.gain.value=e.target.value/100; });

function clearRow(r) { const p=getPatternGrid(currentTab); for(let s=0;s<32;s++)p[r][s]=false; renderGrid(); }
function clearAll() {
  if(currentTab==='drone')stopAllDrones();
  const p=getPatternGrid(currentTab);
  for(let r=0;r<NUM_ROWS;r++) for(let s=0;s<32;s++) p[r][s]=false;
  renderGrid();
}
function randomize() {
  const p=getPatternGrid(currentTab);
  const density=currentTab==='drum'?0.2:currentTab==='drone'?0.15:0.12;
  for(let r=0;r<NUM_ROWS;r++) for(let s=0;s<numSteps;s++) p[r][s]=Math.random()<density;
  if(currentTab==='drone') for(let r=0;r<NUM_ROWS;r++) for(let s=0;s<numSteps-1;s++) if(p[r][s]&&Math.random()<0.6) p[r][s+1]=true;
  renderGrid();
}

// ─── IMPORT/EXPORT ───
function exportPattern() {
  const data={
    patterns,currentScale,rootNote,bpm,swing,numSteps,synthWaveform,rowVolumes,
    clipPatternBanks: {
      synth: loadedSamples.synth?.clipPatterns || null,
      drone: loadedSamples.drone?.clipPatterns || null
    }
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='stepforge-pattern.json'; a.click();
  URL.revokeObjectURL(url);
}
function importPattern(e) {
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.patterns) for(let i=0;i<Math.min(MAX_PATTERNS,data.patterns.length);i++) if(data.patterns[i]) for(const t of['synth','drum','drone']) if(data.patterns[i][t]) patterns[i][t]=data.patterns[i][t];
      if(data.currentScale){currentScale=data.currentScale;document.getElementById('scaleSelect').value=currentScale;}
      if(data.rootNote!==undefined){rootNote=data.rootNote;document.getElementById('rootSelect').value=rootNote;}
      if(data.bpm){bpm=data.bpm;document.getElementById('bpmSlider').value=bpm;document.getElementById('bpmVal').textContent=bpm;}
      if(data.swing!==undefined){swing=data.swing;document.getElementById('swingSlider').value=swing;document.getElementById('swingVal').textContent=swing+'%';}
      if(data.numSteps){numSteps=data.numSteps;document.getElementById('stepsSelect').value=numSteps;}
      if(data.synthWaveform){synthWaveform=data.synthWaveform;initWaveBtns();}
      if(data.rowVolumes) Object.assign(rowVolumes,data.rowVolumes);
      if(data.clipPatternBanks?.synth && loadedSamples.synth) loadedSamples.synth.clipPatterns = data.clipPatternBanks.synth;
      if(data.clipPatternBanks?.drone && loadedSamples.drone) loadedSamples.drone.clipPatterns = data.clipPatternBanks.drone;
      renderStepNumbers(); renderGrid();
    }catch(err){alert('Invalid pattern file');}
  };
  reader.readAsText(file); e.target.value='';
}

// ─── KEYBOARD ───
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.key==='1')switchPattern(0);if(e.key==='2')switchPattern(1);
  if(e.key==='3')switchPattern(2);if(e.key==='4')switchPattern(3);
});
</script>
